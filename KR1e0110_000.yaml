body:
  text: 春秋通論目録春秋類卷一王室伐救會盟三章王使至魯魯君臣朝聘于王三章天王崩葬二章王室禍亂二章逆后歸王姬戰伐會盟三章會盟八章卷二戰伐八章魯君即位薨葬二章子卒附諸侯見弒見殺四章討賊吳楚徐越二章滅國四章遷國邑降國邑取邑附諸侯奔執歸入二章執諸侯大夫納君大夫世子卷三殺大夫公子三章大夫奔外大夫叛復入諸侯兄弟四章遷國齊桓城三國三章內大夫卒二章內夫人九章內女四章卷四魯滅國取田邑齊取魯田邑內圍邑諸國伐魯歸田搜狩城築內嵗祲有年內災內毁作魯君臣如列國諸侯來諸侯如外大夫來內外平書爵書行次書名五章書人隱桓莊三世大夫書繫書族書名通例七章臣等謹案春秋通論四卷國朝方苞撰苞字靈臯桐城人康熙丙戌會試中式舉人官至內閣學士緣事禠職校書武英殿後以翰林院侍講銜致仕是編本孟子其文則史其義則某竊取之意貫穿全經按所屬之辭核以所比之事辨其孰為舊文孰為筆削分類排比為篇四十每篇之內又各以類從凡分章九十有九其間據理而談有似是而非者如王室伐救會盟篇中稱周之東遷晉鄭焉依平王之初文侯武公心在王室故數十年中諸夏之邦無篡弒滅國之事是統紀猶未盡散云云今考寄帑取虢載在鄭語虢叔死焉亦見隱元年克段之傳則噬鄰自廣即在武侯苞謂無滅國之事殆乖其實至於桓公無王之類亦尚沿舊解然掃除二傳附會之談蕩滌宋儒鍥薄之論息心微氣以經求經多有合於情理之正雖孰為舊聞孰為筆削或不免斷之太確如親見尼山之操觚而論其宏旨亦大致不悖於聖人矣乾隆四十二年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
