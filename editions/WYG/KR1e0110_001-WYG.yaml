body:
  text: 春秋通論卷一翰林院侍講銜方苞撰王室伐救㑹盟三章周官大司馬之職及師大合軍以行禁令以救無辜伐有罪大合軍者方伯連帥各以其師至而大司馬監臨之召虎南征方叔北伐𫝊所稱天子之老請帥王賦元戎十乘以先啟行是也又曰若大師則掌其戒令謂王親在行則大司馬巡陣眡事而賞罰常武之詩王謂尹氏命程伯休父左右陳行戒我師旅是也司盟之職凡邦國有疑㑹同則掌其盟約之載蓋天子時巡諸侯㑹朝於方嶽其有不恊者則使王官莅盟言歸于信睦覲禮所載祀方明之禮是也周之東遷晉鄭焉依平王之初文侯武公心在王室故數十年中諸夏之邦未見簒弑滅國之事是統紀猶未盡散也至平王二十六年曲沃封而晉難萌二十八年莊公嗣而鄭釁起馴至平王之末則晉不能自保而鄭且包禍心王室孤危而無與立故自入春秋天王嶽狩諸侯朝覲㑹同無一見焉王師再出皆為亂臣所挫隱公之篇王數加禮而魯不一答天下無道遂至於此此春秋之作所以始於隱公而不始於惠公也禮樂征伐無一自天子出簒弑攘奪所以接跡於天下也王室益衰天下視共主如弁髦自繻葛之戰始先儒謂鄭伯不朝其罪至貶爵削地而止桓王置魯宋弑君之賊而親伐鄭故王不稱天非也征伐不行則禮樂政教任天下之滅裂而莫可誰何故周公建典五官之大政具列于大司馬立政之篇曰其克詰爾戎兵以陟禹之迹康王嗣位召公陳戒首曰張皇六師當幽平之後欲起既墜之王綱非先之以征誅不可而征誅之行莫急于討鄭蓋鄭王室之近親甸服之侯伯玉朝之卿士也鄭之逆亂不能討而能正外諸侯乎以見諸行事者言之桓王乃志在撥亂之君其伐鄭亦非中無所主而倉卒妄出也當平王之末鄭已與王相惡至交質子王崩之次月興師以犯王都其罪乃九伐之法所未有也故始朝而嗣王不禮焉乃法所宜然但其君臣皆尚謀詐而善用兵克段以後敗宋以前攻戰之事十有四所當無不摧破王固知力之不能敵也故繼序十有四年而不敢聲言其惡至魯軌之弑鄭既受賂而與之盟宋督之弑復衆㑹以成其亂此不能正則更無以馭邦國矣王之伐鄭必謂鄭莊文深而多數毎假禮讓以濟其私故王雖不禮猶挾齊以朝取其私田亦未敢拒命故親率蔡衛陳以聲討焉冀鄭顯屈于共主之大義隂懼于三怨之恊心保疆無動修辭請罪則因而撫之以釋前愆責後效庶幾王靈少振而威柄可以漸收不料其抗兵相加六師撓敗以至逆亂之黨益公行而無所忌也故咎桓王不能修徳明政以終復文武之基緒可也謂不當伐鄭而置亂賊于不問則非其情實矣徵之傳記桓王即位之三年嘗命虢公伐曲沃莊伯而立哀侯于翼矣其後又以師及秦師圍魏而執芮伯矣繻葛既敗之後子突救衛以拒朔又明著于經矣曲沃武公弑晉哀侯及小子侯又使虢仲致討而立哀侯之弟緡矣晉芮之事不見於經時晉尚未與魯通而芮則王室不告也桓王之討伐非盡不能行也惟不能行于魯宋耳所以不能行于魯宋者以鄭莊怙亂而齊襄為之輔耳衛朔構殺君兄二公子出之以立黔牟天王主之鄭齊魯宋猶悍然抗王師以納朔使桓王嗣位之初遽出師以討魯宋則齊助其外而鄭起于内王室之憂且岌岌乎其在宗社矣君子以是益歎息痛恨于平王也酈山之禍雖烈而中興之迹未逺宜臼即位之初晉鄭同心齊魯宋衛無變秦仲之後世為西陲之力臣使能枕戈泣血徵諸夏之師親率晉鄭以誅申侯子帶之亂王赴告三國秦伯師于河上晉文入定襄王立誅子帶況申侯之大惡乎然後益廣秦之故封建其支庻以禦戎狄而内固岐雍保民經武則周道之興也勃矣乃晏安蹙縮五十餘年棄岐西則自撥本根而力不足以懾小國戍申甫則衆皆藏惡而義不足以作人心馴至末年鄭既鴟張蘇亦内畔桓王所遭之時勢雖以宣王方召當之用力倍難成功正未可必也春秋作始于平桓之交蓋深痛平王坐失可為之時至桓王則力屈于所欲為民去公室則仲尼圍成而不能服況桓王乎而身困于其所當為也此見諸行事之深切著明者而諸儒乃以伐鄭為桓王罪誤矣然則王不稱天何也凡文有所承則王不加天公朝于王所是也文無所承而其事非王所親亦不加天公㑹王人王人子突救衛是也言各有當而以為筆削之特文則義無所處矣自入春秋凡㑹盟皆諸侯之私約也王師伐鄭救衛而外凡戰伐皆列國之擅興也王臣之與㑹盟自齊桓晉文始首止之㑹以戴王世子洮之盟以謀王室葵丘之㑹以明王禁宰周公與㑹而不與盟皆正也踐土之盟要王以涖之則譎矣然王子虎猶不與盟故得與齊桓三㑹同文惟翟泉之盟書㑹而不書公則特文以著其罪也翟泉之盟王人共㰱與洮同而書法異王室有故告于諸侯而王臣與盟禮之可以義起者也王室無故霸勢方張而於畿内盟王臣使陪臣主衆㑹則上偪也踐土之盟王子虎涖之與葵丘同而書法異涖明王禁書㑹宰周公可也盟于王所而書㑹王子虎不可也王臣之與戰伐自成十六年晉厲公伐鄭始前此桓文倡霸徵兵討貳不聞請命于王非禮也而實霸迹之盛也及楚氛益熾中夏懾威諸侯疑貳然後援王臣以屬之禮也而實霸事之衰也然其號則正義亦無疵焉惟前十三年伐秦傳稱劉子成子㑹伐而經不書則筆削之義存焉耳諸侯本非入朝其㑹于京師必為請王臣同役傳得其實必孔子削之凡書如者無名之辭也不書公朝于京師而與如齊如晉同文以著諸侯之志不在朝也若書劉成則似因朝而受命於王無以著其師過而朝之慢矣書劉成則當云公朝于京師夏五月遂與劉子成子某侯某伯某人伐秦不得書㑹亦不必更書自京師嗚呼周公建六典以經邦國中外上下聨為一體惟恃禮樂征伐以維持而貫達焉周道傷于幽厲至平王而廢絶然後禮樂征伐不出于天子然人不能由而道未嘗亡也故桓文倡霸假其道而用之則數十年中簒弑者多伏其辜參盟㡬絶私戰亦希晉厲公以後征伐㑹盟數援王臣以涖之則天王之葬魯皆應時以㑹惟靈王之喪公在楚季孫興師取卞公㡬不敢入故志崩而不志葬傳載鄭游吉之言曰靈王之喪我先君簡公在楚我先大夫印段實往王吏不討恤所無也則當時諸侯實因是而尚知有王用此觀之苟有用孔子者皆可以為東周而定衛之變必先正名聖人撥亂反正見諸行事之實其端緒即于是可窺尋矣王使至魯魯君臣朝聘于王三章天王於魯來錫命者三歸賵含者二歸脤者一㑹葬者二求賻求車求金者各一皆以非禮書若王臣聘魯魯君臣朝聘于王則禮也禮則常事也而不削何也魯不朝而王乃聘焉傎也聘而不報而又聘焉益傎也君不朝而臣聘則抗也聘列國勤于京師則無等也天王下勞晉侯而公就朝則非其所也諸侯㑹伐而道如京師則非其事也春秋之法常事不書然必盡合于禮而後得為常二百四十二年之中聘王者三朝王者二如京師者一而得為常事乎又況朝非其所而如京師不以其事乎若并此而削之轉疑於得禮而不書矣僖文以後魯卿始有聘周之文隠桓間王亟加禮而無一報焉何也此觀于魯之邦交而知之矣公朝於齊晉則間得聘焉宋衛之聘則交相報薛滕邾杞之朝則未有以聘報者矣魯之視周蓋不得儕于宋衛也此春秋之作所以始于隠也安知非㣲者徃而不著于册書也莊之三年使㣲者葬王而經志之矣隠三年武氏子來求賻而不志葬則㣲者亦未徃可知矣莊僖之間王臣不聘魯者㡬六十年論者以為齊桓明禁之功非也王臣下聘禮也非禁之所宜及也且莊二十六年齊桓始霸前此固未有聘也蓋莊僖之間王室多難未遑外事又見數禮於魯而不報耳晉文本謀以勤王屬諸侯故當是時王使再來而魯應時以報焉晉文既殁則不復然矣毛伯求金以後百四十年而王使僅三至蓋自知空名不足以結魯而益怠矣王錫魯命者三于文公成公稱天王于桓公稱王㑹葬者二于僖公稱天王于成風稱王此所謂大義數十炳如日星者也歸仲子之賵猶稱天王者因惠公而及之猶未成之為夫人也若禮于成風則視夫人之常數而有加矣錫桓公命王不稱天而聘桓皆稱天王何也聘者懐邦國之常典魯國之為非為一人也錫命則專禮于其人而褒大之也且死者人之終事也故簒弑之賊有生不能討死而加戮者矣至是而特錫之命是義之也不天甚矣春秋之義非獨責王所以決疑而定法也隱公之弑不見於經雖薨而不地葬而不書猶未知賊之在也錫桓公命王不稱天而後獄有所歸矣成風薨葬一同于夫人無以明僖公之違禮也歸含賵㑹葬王不稱天而後知大從之終不可亂矣凡此類皆春秋之特文有不得已而後見者也王使至魯惟隱桓文三世為勤隱之世四桓之世四文之世五餘九公五而莊元年猶為桓至也每使至之勤則有所求于隱求賻于桓求車于文求金此王室所以卑諸侯所以恣也求賻求金不言王使以在喪而聴於冢宰以此知春秋時典禮未全廢也天王崩葬二章天王之崩訃則書魯使人㑹則書葬葬而不書㑹者其人㣲也崩而不書不訃也惠王之崩也傳猶志之莊僖二王之崩則傳亦闕焉是天下諸侯皆無訃也其不訃何也天下諸侯宜親周者莫如魯王恩禮所加亦莫如魯惠公仲子之賵天子之宰親焉而平王之葬魯不㑹也錫桓公命榮叔實來而桓王之葬魯乃使㣲者徃此莊僖二王之喪所以不訃也當是時齊桓創霸而不能率諸侯以達王事何也齊桓之霸也與晉文異晉文之興霸者之轍迹已前見矣故曰求諸侯莫如勤王齊桓之前則未有是也非先得諸侯不能致勤于王室而方是時諸侯尚渙也莊王之崩在莊十二年僖王之崩在莊十七年齊桓始入未能屬諸侯故師于長勺而魯敗之㑹于北杏而宋叛之再㑹于鄄而鄭叛之同盟于幽而魯叛之以信則未孚以威則未懾諸侯方􅍀然自外于齊而安能使帥王職哉直至僖公之世退狄伐戎帖楚然後諸侯服霸勢成而尊王之事起著于經者可考也魯事周之勤怠一視乎霸迹之盛衰文九年葬襄王叔孫得臣如京師至十四年而頃王之崩葬無聞焉則文襄既没賊盾操國而霸統中絶也自宣以後天王之崩無不志者以晉霸雖衰而㑹盟征伐常假王命以屬諸侯也景王之葬叔鞅如京師以平丘之㑹劉子實涖之也自齊桓創霸晉文繼之然後諸侯知有王觀莊僖二王崩葬之不志則霸者之功不可沒矣觀桓文以後諸侯卒無親赴天王之崩葬者則霸者之罪亦不可掩矣抑于此見經因魯史有所損而不能益焉天王崩葬雖易世以後可考而知而魯史所無者不敢益也非不能益也益之而悖慢之實隠矣其文則史而義即于是乎取焉此其較著者也惠王之崩傳載周公閲與王孫蘇爭政故不訃莊僖之間頽有禍心安知非以是而不訃也王室有故毎假外諸侯之權以鎮之無為不訃也景王之崩王室之亂極矣而崩葬皆志于經以是知莊僖惠三王之不訃非以内難也度諸侯之弱王室不能用典而不訃以殺恥也訃而若弗聞也者雖匹敵不可堪況臣下乎此當日之情實也王室禍亂二章王室禍亂魯不與聞則不書而先儒以筆削之㫖求之是以終不能安也子頽之亂惠王之定不書以虢鄭尸之而魯不與也襄王之入叔帶之討不書以晉尸之而魯不與也子朝之亂備書于册以叔鞅方有事于京師而其後戍周城周魯皆與也蓋王室懿親莫重于魯有禍亂興魯不能救而他國有功則魯人恥之而不書于册孔子不能益也襄王之出獨書何也王命特至于魯而臧文仲有奔問官守之對則其時已著于册書矣厥後終不能勤王是以忌晉之功而不書王入也抑觀齊桓之霸也列國禍難無不勤恤而子頽之亂未嘗過而問焉豈虢公鄭伯世執周政力能定王未嘗赴告于外而不敢引為己任與叔帶子朝之亂傳載告難于齊晉甚詳而子頽之亂無聞焉則不告于外可知矣晉文以勤王求諸侯襄王之入赴吿必及于魯而史不書以是知為魯人之私也以為孔子削之則未有處也襄王書出越在鄭地也王猛居皇敬王居狄泉不書出畿内也王猛居皇入王城敬王居狄泉入成周皆單子劉子左右之而或書以或不書以何也以未踰年之子猶可言也以天王則疑于大惡矣且王猛時尚未知誰為當立者以出入者獨單劉耳敬王之立則晉人問于介衆而辭子朝名義顯著歸心者不獨單劉矣猛生而稱王不稱王子者嫌與子朝同辭也卒而稱王子者未踰年也春秋之書㣲而顯此其凡也逆后歸王姬逆后王姬歸魯為主則書者舊史之法也失禮然後書者春秋之法也夫人之娶内女之歸有變失禮然後書則逆后王姬歸非失禮不書可知矣王姬之歸惟見于莊之篇所以著忘親之罪也逆王后于紀以祭公來而遂逆書也逆王后于齊以劉夏非卿書也致女納幣而使卿以過禮書則逆后而不使卿以失禮書宜矣紀姜之歸京師書而齊姜不書何也春劉夏逆后而夏齊侯伐我北鄙自是無嵗不有齊師盖邦交絶而姜歸不告故舊史無其文耳歸王姬于齊襄其事詳在喪而主讐婚故備書以著其惡也歸王姬于齊桓其事畧惡有差也桓之王姬不書卒而襄之王姬書卒見公之偏厚于讐仇也戰伐㑹盟三章孔子曰天下無道則禮樂征伐自諸侯出自諸侯出十世希不失矣自大夫出五世希不失矣春秋之初天王猶小有征伐至子突救衛以後則無聞焉自隠至僖凡㑹盟戰伐之大者皆諸侯主之是天子之㣲而諸侯之恣也自僖之末以至文宣則諸侯之怠而大夫之張也自宣之末以至襄昭則大夫之恣而諸侯之㣲也自昭以至定哀則列國之衰而呉楚之横也隠桓莊之世諸侯之特相盟交相伐者藉藉焉桓文既霸則無是矣及定哀而特相盟交相伐者不異于春秋之初則霸統之既絶也齊桓初殁以及靈成景厲之間晉霸中衰則間之而私㑹盟私侵伐者汲汲焉葢紀散則衆亂也及其季也㑹于申而天下之諸侯聴于楚矣滅陳滅蔡伐呉誅齊慶封而天下之征伐聴于楚矣又其季也入郢敗齊伐魯伐陳遷蔡藩衛侯㑹于黄池而天下之㑹盟征伐聴于吴矣夫以天下諸侯之衆而不能支吴楚者非力弱也其勢衰耳非勢衰也其紀散耳定之四年㑹于召陵者十八國雖桓文所資以屈楚不若是之衆也而方是時晉有六卿齊有陳氏魯有三桓宋衛陳鄭皆有強家各固其私而莫肯盡力於君事故未見呉楚之鋒而已渙然自離喪矣一國之紀散則無以率臣民霸者之紀散則無以屬諸侯非一朝一夕之故其所由來者漸矣㑹盟征伐或書人或以名見皆舊史之文也謂諸侯貶稱人者據左氏所傳而不知其為大夫也謂大夫貶稱人者不知其為舊史之文而以為春秋之法也自文以前㑹盟侵伐内大夫以名見而外大夫悉稱人蓋大夫末張奉君命以行事第稱為某國之人而不必詳其名氏也文二年晉士縠盟諸侯于垂隴是外大夫盟㑹書名之始也由是而衡雍新城之趙盾承匡之郤缺皆以名見矣至宣十五年無婁之盟而齊高固亦以名見矣文三年晉陽處父伐楚以救江是外大夫侵伐書名之始也由是而郤缺之伐蔡趙盾之救陳趙穿之侵崇皆以名見矣由是而宋華元鄭公子歸生衛孫免亦以名見矣然自宣以前盟㑹書名者不過霸國之大夫而已侵伐書名者不過霸國之大夫與一國二國之大夫而已㑹伐㑹盟而列序大夫之名氏者無有也自成二年戰于鞌内大夫四人並列而晉郤克衛孫良夫曹公子首皆列序焉成十五年㑹呉于鍾離而晉士爕齊高無咎宋華元衛孫林父鄭公子鰌皆列序焉自是以後不以名見而稱人者惟曹許邾莒滕薛把鄫小國之大夫而已而大國之臣亦有不以名見者則非卿也襄十四年春㑹呉于向晉士匄鄭公孫蠆以名見而齊宋衛稱人夏伐秦衛北宫括鄭公孫蠆以名見而齊宋稱人是也夫始皆稱人繼而霸國之大夫以名見繼而列國之大夫皆以名見而小國之大夫終春秋無以名見者以是知大夫漸張則舊史書之亦漸詳而非春秋之法也秦雖強而比于小國者讐晉而逺于東夏也自文以前外大夫盟㑹皆稱人而僖二十五年公㑹衛子莒慶盟于洮二十六年公㑹莒子衛甯速盟于向蓋莒慶吾姻也故特書其名而甯速因例焉終春秋小國之大夫皆稱人而鞌之戰曹公子首以名見蓋三桓自喜其事而史不能正也以為褒貶所寓則義無所處矣然舊史以私意為詳略非有典法而孔子不革何也其略者不可得而詳也其詳者革之以定于一則世變邦交轉不可得而考矣魯君臣與隣國特盟與一國同侵伐或書㑹或書及自參以上皆書㑹傳曰及者我所欲㑹者外為志也蓋㑹伐齊盟事由衆起非我所欲也二國同役而㑹與及異書則知㑹者以我而從彼及者要彼以從我矣其義莫著于定四年臯鼬之盟蓋既㑹而盟當書諸侯盟于臯鼬而覆書公及者定受國于意如三年如晉見却而以與盟為幸也有㑹盟書及而非以我所欲為義者則文當然也首止書及所以殊王世子也盟袁僑書及以上承雞澤之盟不可曰豹㑹諸侯之大夫也蜀之盟書及不得再書公㑹也宋之盟書及不得再書豹㑹也㑹呉于鍾離于柤皆㑹又㑹而首止則及以㑹㑹又㑹者班同也及以㑹者尊王世子也以是知文各有所當也凡盟書及書㑹而不目其人者君也侵伐書入書伐書及以伐而不目其人則㣲者也何以明其然也終春秋無外㣲者與魯盟則知無内㣲者與外盟也幽之盟齊桓始霸在㑹皆大國公侯而魯乃使㣲者往乎高傒處父肯與吾㣲者盟乎以是知諱不書公所以徵過而諱耻也若侵伐則過不待徵而書戰即諱敗也圍郕救齊稱師而外君將稱君大夫將稱名而不目其人則微者可知矣此所以文同而義異也凡諱耻者舊史之文也徵過者春秋之法也處父之盟没公以諱耻􅃇史所知也于宿于幽于齊翟泉蘇子高傒之盟没公以徵過則非舊史所能知也㑹盟八章隠桓莊閔僖百年之中魯君㑹遇及盟者五十有九大夫㑹盟者四而其中各有故焉于折則未能信于宋而使柔先之也于鄄則未肯聴于齊而使單伯先之也結則以媵而適遇齊宋之盟也友如齊涖盟非君所親也外大夫與魯君㑹盟者四而浮來則離㑹也于蔇則齊無君也于齊則楚人入受夏盟也惟翟泉則大夫之僭端見焉而是乃僖之季世也魯不與而諸侯自為㑹遇及盟者十有四而大夫之盟四惡曹則㑹伐之師方罷而使大夫申其信也鹿上則將合諸侯而使大夫先之也盟于邢及狄盟非君所親也葢百年之中㑹盟之大者皆諸侯自主之而其小者乃間使大夫承事焉至于文宣則諸侯少怠而大夫張矣故魯君之㑹盟十有二大夫之㑹盟十有一然方是時有魯大夫㑹盟外諸侯者矣有魯大夫與諸侯之大夫特㑹盟者矣其衆㑹而皆以大夫尸之者無有也至宣十二年清丘之盟則四國稱人而無諸侯以涖之是文宣之世將變而為成襄之始事也然成襄之世大夫與諸侯猶更出為㑹盟也至于昭則君之㑹一而不得與于盟而大夫之㑹盟六合而計之則天下諸侯之㑹二而大夫之㑹四蓋列國之君無一不失其操柄者矣此申之㑹所以胥天下而聴于楚也至定哀之世則魯大夫再盟邾一盟鄭而自叔還㑹呉以外齊呉強國之㑹反無一不屬之公蓋以平丘之㑹意如見執三桓懲焉故自是以後齊晉及呉之盟㑹皆使君試其危而已不與也亦猶伐齊侵楚推而屬之公而曹邾費郈之師則三桓自將也魯君大夫之㑹盟與戰伐相表裏而列國之㑹盟戰伐皆與魯一轍察其始終則世變極矣首止葵丘平丘盟與㑹同地而再書其地説者曰書之重辭之複其中必有大美惡焉非也有事而㑹不恊而盟或示威于衆或昭盟于神其禮本異故書㑹而不書盟者専行㑹禮也書盟而不書㑹者専行盟禮也既㑹而盟則書㑹而又書盟所以見事實也其同地而再書所以别于異地也襄二十五年夏五月諸侯㑹于夷儀秋八月同盟于重丘是㑹盟異地而兩書其地者也異地者既兩書則同地者安得不再書也所以異于溴梁者何也溴梁之盟以經考之則盟之月即㑹之月也以傳徵之則盟之日即㑹之日也而安得再書其地乎首止葵丘則夏而㑹秋而盟平丘則首月而㑹仲月而盟而安得不再書其地乎首止葵丘之覆舉諸侯也以王世子宰周公之不與也平丘之盟魯君不與而不覆舉諸侯何也覆舉諸侯無以見公之不與也既明著公之不與而覆舉諸侯則贅矣重丘之盟無所嫌而覆舉諸侯何也中有間事也與同圍齊盟于祝柯中有間事而覆舉諸侯同義也襄十一年夏伐鄭秋盟亳北中無間事而不覆舉諸侯則與平丘同義也凡盟以日繫月而後列序其人者常也而新城雞澤之盟列序諸侯而後書日蓋諸侯始將為㑹至期而更為盟也所以别于始以盟召諸侯者也春秋之文因時異施而各有典法皆此類也㑹盟未有書其故者而書其故者二以決疑也稷之㑹不言其故則疑於欲討宋亂而不能也澶淵之㑹不言其故則疑於欲討蔡亂而不能也内㑹盟未有不書君大夫者而不書君大夫者三以徵過也于幽則諸侯而主齊盟之始也于齊則諸侯與大夫共盟之始也翟泉則諸侯之大夫與王臣共盟之始也故諱不書公以徵過焉諸侯衆㑹而為不義其惡有甚此者矣而獨于此諱公何也惡之無可疑者不必著也若于幽則霸者首義以尊王于齊則修桓公之好而楚人入受盟翟泉則霸者率列國以承王事董子所謂春秋視人所惑立說以大明之此類是也于齊之盟齊君在焉未若㑹楚嬰齊盟蜀之甚也而蜀不諱公何也此義之變也楚師内侵以鞌之戰故三桓懼討而以公試焉且是盟也不獨宋衛陳鄭之君不與也邾鄫㣲國皆以大夫㑹而魯獨君徃則三桓之惡極矣書公而不諱所以著三桓之罪也春秋時國事之傎未有甚于魯者三桓之在國重于君而諸侯視之亦重于君邢丘之㑹公在晉而季孫宿即事非優公也謂公承命不若季孫之承命為可信也平丘之盟公不與而執意如非恕公也謂止公不若止季孫為魯所急也鄫之㑹魯君親徃而呉召季孫太宰噽曰國君道長而大夫不出門此何禮也觀此而蜀不諱公之義不益深切著明矣哉内特盟不目其人而書及者四傳于高傒處父曰公于宿曰㣲者非也自文以前百年之間内大夫與于㑹盟者四則大夫之専盟也僅矣況㣲者乎隠之世盟㑹皆公而即位之初使㣲者盟宋人非事之情也蓋于宿乃諸侯與大夫特盟之始故書及而没公猶于齊為諸侯與大夫共盟之始書㑹而没公也高傒之盟則求婚于讐國也女栗之盟則王喪不奔王立不朝而與王臣要盟也盟之非義者多矣而獨于此諱公何也于宿則結四隣之好女栗則受王臣之約非諱公無以知其非義也惟圖婚于齊其惡顯著然魯桓見戕經無明文而前此與齊㑹盟者屢矣非特文以見義恐習而不知其非也若處父之盟則舊史諱其辱也知然者以并没公之如晉及至自晉也成十一年諱公送葬則并没葬晉景公之文亦猶是也外大夫來聘而盟亦書及而不書盟者何也來盟不書盟者莅盟不書其人以國與之也來聘而盟與來盟同義不書盟者則不得不第書及也何以知其非諱也魯大夫有特盟霸主者矣魯君盟外大夫屢見于經矣無為於來聘而盟諱也然則公如晉公及晉侯盟事與來聘而盟者類而復書公何也不復書公則似公以召盟往而無以明其為異事也若來聘而盟則異事不待言矣故從以國與之之義而第書及也盟之或書同或不書同皆舊史之文也舊史之文異以載書之辭本異也自莊十六年盟幽以前見經者特盟參盟而已不可以言同也以一國而主天下之盟自幽始故載書之辭言同以紀實也以固信也而既盟之後詹逃而鄭貳西鄙伐而魯叛則諸侯猶未同心而戢志也故後幽之盟載書復言同以申其信自是以後霸權日盛召盟而諸侯聴焉載書不復言同矣宋襄再盟不言同曹南鹿上皆參盟也晉文一戰屈楚而從者翕然故盟不言同知其無異心也文襄既殁靈公方㓜陳蔡鄭宋同時而折于楚故文十四年新城之盟復書同自二幽以來未之有也蓋合異以為同故以是要言而欲其無匱也後此不書同晉霸猶未衰也自戰邲以後楚勢益張而諸侯反側載書無不言同者矣以悼公之盛而雞澤戲亳之盟皆書同者承靈成景厲之衰也三駕以前蓋時懼諸侯之道敝焉平公少懦矣而溴梁祝柯澶淵之盟不書同者席悼之盛也蕭魚以後在㑹者無異心矣其後晉有欒氏之亂諸侯離叛而重邱之盟復書同矣呉興楚敝不復有事于北方而臯鼬之盟不書同矣以是知凡書同者皆懼其異而載書以是要言也薄蜀二盟楚人以力脅諸侯而不屑要之以同宋之盟晉楚為成則更無二三之患矣故皆不言同也或謂用方盟之禮而書同非也葵丘踐土之盛皆不用方盟之禮而清丘之盟四國之大夫乃用之乎至以褒貶為義則無一可通者矣㑹盟書至歸而告廟也必重其事有戒心而後以告於廟故通十二公無與大夫㑹盟而致者以其事為己輕也雖重其事而無戒心亦不致故自僖十五年牡丘以前公與諸侯㑹盟無致者雖齊桓之㑹盟不致而致盟唐則懼戎也隠之盟戎不致而桓致者戎魯壤接鍾巫之事懼討而以盟為幸也齊桓之㑹盟至牡丘于淮而後致楚狄交横而桓徳衰也晉文之興首為踐土之盟而執衛侯諸侯恐懼自是霸者之㑹盟無不致者矣衆㑹齊盟然後討執行焉故特㑹參盟雖霸主與焉亦不致無所懼也定哀之際特㑹齊侯而致則晉衰齊横而魯益㣲也呉之強諸侯皆懾焉而鄫與槖臯之㑹不致何也呉多行無禮雖屈伏焉而以為辱故反不告也以盟處父為辱則不書如晉以送葬為辱則不書至自晉黄池之㑹與晉侯偕則致矣昭公既孫而鄟陵之盟致者諸侯去國必載主祏以行也襄七年㑹鄬八年盟戲不書至者鄬之㑹未歸而如晉故以自晉致戲之盟未歸而㑹柤故歸自柤而後致也㑹盟之致與戰伐同揆特㑹參盟不致而致盟戎猶有事于齊宋鄭衛不致而致伐戎也與霸主衆㑹齊盟而致猶與霸者同役連數國之師而致也宣以前㑹齊侯不致而定哀之㑹齊侯則致猶有事于小國不致而伐齊則致也然則重其事有戒心而後以告於廟也審矣外大夫㑹盟不書名不書人而以大夫係國者二莊九年公及齊大夫盟于蔇也文七年公㑹諸侯晉大夫盟于扈也蔇稱齊大夫以實屬辭也齊無君魯納糾而受盟者非一人也扈之盟則晉大夫主諸侯之始也使書趙盾則諸侯與大夫共㑹盟之常辭而習其讀者弗之察矣何以知非其受盟者衆也晉有君而盾專晉也諸侯之不序何也列序諸侯而晉大夫不名非屬辭之體也晉大夫之主盟前此矣而見義于此何也垂隴之盟士縠奉君命以承事而已若扈之盟則制在盾矣悼公之世盟陳袁僑則曰諸侯之大夫平公之世盟于溴梁則第曰大夫而不係於諸侯即此義也文之篇諸侯不序者三七年盟扈以大夫而主諸侯也十五年盟扈十七年㑹扈以大夫而列序諸侯之上也知然者以僖二十七年盟宋書公㑹諸侯而不言楚人也蓋宋之盟魯㑹楚非為諸侯也而所㑹者即楚人帥以圍宋之諸侯也未有盟諸侯而不盟楚人者而第書諸侯則諱楚大夫之先諸侯可知矣文襄以後凡諸侯之合皆晉故也未有諸侯自為㑹盟而晉人不與者而第書諸侯則諱晉大夫之先諸侯可知矣使晉楚之大夫列序諸侯之下則不必諱也列序諸侯而不書晉楚之大夫又似諸侯自為㑹盟而晉楚實不與矣宋之盟之先楚人也以圍宋之先楚人知之也主兵而先猶可言也列㑹而先不可言也盟扈㑹扈之先晉大夫也以前扈之盟晉大夫猶列序諸侯之下知之也主盟而列序于下猶可言也主盟而列序于上不可言也傳謂二扈之盟㑹皆晉侯親之而罪諸侯之不討賊非也賊之不討不以諸侯之序不序異義者也盟主大合諸侯而不能討賊列序之而其罪益著矣襄二十五年㑹于夷儀釋賊不討而諸侯皆序正此義也果晉侯主之則何為不序哉于幽于齊翟泉之盟及文之篇再盟于扈一㑹于扈皆以志班位之亂政柄之移而或以没公而書㑹見義或以諸侯不序大夫不名見義何也使于幽于齊翟泉之盟而總言諸侯大夫則其事之實不可得而見也使盟扈㑹扈而序諸侯名大夫則其事之實亦不可得而見也于幽齊桓得諸侯之始也使書公㑹諸侯盟于幽則不知主盟者齊與從之者何國也于齊楚人入盟諸夏之始也使書公㑹諸侯之大夫盟于齊則不知欲為是盟者楚與從之者何國也翟泉晉文得諸侯之始也使書公㑹王人諸侯之大夫盟于翟泉則不知主為是盟者晉與從之者何國也若文襄以後則從晉㑹盟之諸侯俱可知矣雖不列序而知其為何國也使文七年書㑹齊侯宋公衛侯陳侯鄭伯許男曹伯晉趙盾盟于扈則與垂隴同文而無以見其為大夫主諸侯之始矣雖没公而不知其義之安在也十五年盟扈十七年㑹扈列序諸侯則似諸侯自為盟㑹而晉實不與矣此春秋之文各稱其事而不可以相易者也其義又於莊公之狩禚見之蓋特㑹特盟之非義没公而書及者其常也而是役則義起于齊侯者也必書公㑹而變文稱齊人然後知齊侯者乃公不共戴天之讐而必不可以㑹焉者也使書㑹齊侯狩于禚則疑以外諸侯狩于内地為譏而其義隠矣盟扈㑹扈以志諸侯之失位大夫亂常是義起於諸侯大夫者也使諸侯序大夫名則與他役同而其義不可得而見矣春秋通論卷一
