body:
  text: 春秋通論卷二翰林院侍講銜方苞撰戰伐八章觀魯之軍政而盛衰存亡之由可考也隠之世翬再主兵而有鍾巫之變桓莊懲焉桓之篇君將者四㣲者之師四君將者皆大國之事也餘則小國疆邑之事也莊之篇君將者十三大夫將者二於餘丘㣲國也㑹齊伐衛亦淺事也僖之篇君將者九大夫將者四其末年遂再主兵而瑕釁萌矣文繼以怠自七年伐邾而外凡役皆大夫主之而三桓之勢成矣宣公怵于三桓之勢獨任歸父以抗之而反為所逐于是兵柄盡歸于三桓成襄之世惟霸主在行公乃親㑹非公能主兵三桓不敢抗霸以取罪耳其餘侵伐皆三桓更將自叔老㑹伐許而外五十年間未嘗假手于列大夫蓋懲于歸父之事而併力以弱公也昭公終世未嘗親將蓋中軍初毁三桓各私其衆而使公不得近也至定哀而反有親將者民之去公乆矣以為不足忌也故私家之兵有事則使公將之猶魯盛時公室之兵有事使大夫將之公名為主兵實供大夫之職耳且圍私邑披小弱則三桓尸之犯強鄰結讐釁則公試之據事直書而其惡不可掩矣書及戰書伐入而不目君大夫者五而桓之世有四豈以翬之帥師為戒故身所不親轉使㣲者將而不敢以屬重人與然不善之積所以階禍而滅身者豈可以曲備哉魯舊二軍皆公室之兵也作三軍者季氏自為一軍孟叔共為一軍而公徒為中軍也孟孫取四之一叔孫取四之二故共為一軍而公所得之五為中軍惟中軍屬公故後復毁之而叔孫早知其然也鞌之戰四卿並將主帥與其佐也以是知魯舊二軍也中軍既毁則仍二軍矣而昭十年伐邾三卿並將何也孟叔雖共為一軍而主兵者則不肯相下也二卿並聘而書二卿並㑹而書亦猶是也清之戰季氏為左師孟叔為右師則謂三桓各有一軍誤矣晉六卿並出獨書元帥者統于君也魯自成襄以後三卿出則書三卿二卿出則書二卿者散辭也不屬于君而無所統也魯君侵伐或致或不致或致以前事或致以後事皆舊史之文也蓋重其事則反必告廟告則書凡書至皆與霸主同役也非然則連數國之師也獨用師而致者惟有事于齊則畏之也通十二公未有用師于小國而致者以是知輕其事則不致也莊公伐戎而致以戎世為魯患也鄢陵之後成公㑹伐鄭者三前以㑹致而後以伐致者前㑹而未伐後㑹而伐也十六年諸侯次于鄭西魯以内難不敢過鄭則不與伐可知矣十七年夏伐鄭自童戲至于曲洧楚人師于首止而諸侯還則兵未嘗接可知矣故皆以㑹致惟冬伐鄭傳稱圍則恊心同攻而薄其城下故以伐致也盟戲之後襄公㑹伐鄭者三前以伐致而後以㑹致者前㑹而伐後㑹而不伐也十年秋伐鄭戍虎牢以逼之十一年夏伐鄭圍之㡬踰時焉故皆以伐致蕭魚之役則觀兵而鄭已受盟故以㑹致也成七年救鄭而以㑹致者不成乎救也僖十五年救徐公不親徐卒為楚敗則以㑹致以是知伐救而以㑹致者皆不成乎伐救也僖四年伐楚前後皆有事而獨以伐楚致者大伐楚也六年伐鄭遂救許而以伐致急服鄭也二十八年㑹温遂圍許而以圍致明周事也皆當日各以所重告廟而史承之以書于䇿也襄二十八年同圍齊而以伐致者紀其事則曰圍而告其功則曰伐也有事于齊無不致而哀七年㑹呉伐齊獨不致者魯不與戰也定公圍成而致則事之變也邦分崩離析故視封内如鄰國家臣如大敵也然亦非經之特文使當日不告于廟不著于册書則孔子不能益也有連數國之師而不致者桓十五年㑹袲伐鄭也蓋返役而告至者重其事而有戒心也桓以前霸事未興東方之大國莫如魯故師還皆不致其致也自桓十六年伐鄭始蓋再出而後得其志故歸告于廟也傳于十五年伐鄭曰不克而還則用力之艱可知矣有與霸國同役而不致者莊二十六年㑹宋人齊人伐徐也二十八年㑹齊人宋人伐鄭也方是時齊霸未盛又二國之君不同役故輕其事而不致也成十年㑹伐鄭襄九年㑹伐鄭則非不致也有繼事而未嘗返國也故以後事告成十年五月㑹伐鄭六月晉侯獳卒七月公如晉次年三月歸必公自㑹遂如晉故以自晉致也襄九年冬十二月盟戲次年春㑹呉于柤夏五月歸必公自戲遂如柤故以後㑹致也傳稱公送晉侯于河上還至衛冠于成公之廟則未返國可知矣通十二公未有用師于小國而致者而齊桓未霸以前用師于齊亦不致以此知不重其事則不告不告則不書也若以筆削之義求之則無一可通者矣魯自成公二年四卿並將之後五十年間自叔老㑹伐許而外主兵者惟三桓而昭公之世叔弓三主兵一與季仲同役以是知叔孫舍之賢也雖私家之兵而仍使公臣將之也定哀而後公臣無將者矣非徒不將也卒見於經者如叔鞅叔輒雖㑹盟不與焉此見諸行事之深切著明者也公羊子曰將尊師衆稱某帥師將尊師少稱將將卑師衆稱師將卑師少稱人以襄二年晉師宋師衛甯殖侵鄭徵之而知其信然也同役而或稱師或稱將則或將卑而師衆或將尊而師少可知矣其師將並書者必將尊而師衆不稱將不稱師而稱人者必將卑師少又可知矣但自文二年晉陽處父伐楚以救江然後霸國之大夫以名見自成二年戰于鞌然後列國之大夫以名見自成以前衆則稱師少則稱人不辨其將之尊卑也自成以後則帥師㑹伐而以名見者卿也或稱人或稱師者大夫也其稱人稱師同而所以稱人稱師者異矣凡霸國之衆㑹未有稱師者賦乘有常而不興大衆也㑹者少則間稱師用衆也晉師宋師衛甯殖侵鄭是也其衆㑹與卿並列而稱人者大夫也襄十二年齊人宋人㑹伐秦十六年宋人㑹伐許是也自宣以前軍旅之事百二十有五而稱師者三十有八自宣以後軍旅之事百七十有六稱人者二十而小國之舉八蓋列國君臣無不阻兵安忍而輕用其民者矣此春秋將變而為戰國之漸也戰而不書敗者勝負敵也侵伐而不書戰者或服而聴命或守而不出也戰而先書伐者已薄其城邑而後出戰也不先書伐者敵未迫而逆戰也自成以前侵伐戰書人者兼將之辭也敗則或書師或書人者别衆寡也戰而書及有以尊及卑者甗是也有以大及小者棘鐵是也有以内及外者泓城濮邲鄢陵栢舉艾陵是也有以親及疎者韓新築彭衙令狐是也有以所重及所輕者長岸是也惟河曲界于秦晉為二國邊邑之爭故不書及也二國合兵以戰伐而書及者此主兵而彼從之晉人及姜戎敗秦于殽是也不書及者並有怨也邢人狄人伐衛晉師白狄伐秦之類是也凡伐國或稱君或稱大夫或稱師或稱人者其常也而鄭伐許秦伐晉晉伐秦晉伐鮮虞獨稱國先儒以為號舉非也其事同時相次而獨于一役貶則其異于前後者何也蓋秦晉鄭許晉狄之戰亟矣又二國之私而與諸侯無與也或赴告不及傳聞畧不知主兵者為君為大夫又不知其師之衆寡則第書某國加兵于某國而已凡用他國之師而書以者必得所以而後能戰伐也故霸國㑹討列國連兵皆列序必以弱假強而後書以宋以四國伐鄭魯以楚師伐齊蔡侯以呉子及楚人戰于栢舉是也戰未有不地者而桓十三年齊宋衛燕之戰不地使戰于紀則當書四國伐紀戰于齊則當書公㑹紀侯鄭伯伐齊蓋齊宋之怨結于紀鄭而魯居其間故四國來伐而魯援紀鄭以拒戰也其不書伐我何也春秋之初魯最為東方之貴國諸侯未有加兵于魯者故十年書來戰于郎此年戰而不地皆舊史諱伐之辭也齊人伐衛衛人及齊人戰其不地者于衛也則内戰而不地由于來伐可知矣其屬辭異于郎何也迫國都也凡伐我至城下則不書四鄙即此義也先儒謂來戰于郎與戰于宋之義相發而弊罪内外非也内師外師之非義有過于二役者矣而於二役特文以罪之則輕重之衡失矣來戰于郎與齊宋衛燕之戰為類者也戰于宋與衛人及齊人戰為類者也既書齊人伐衛復書衛人及齊人戰于衛則贅矣既書及鄭師伐宋復書宋人及我師鄭師戰則亦贅矣其或地或不地文當然耳晉楚之戰非兩國相伐而以爭鄭衛故城濮書楚人救衛邲書楚子圍鄭録合兵之由也鄢陵不書晉侯伐鄭者鄭伯與戰則合兵之由不必録矣初入春秋魯卿㑹伐必書帥師自齊桓以後不書蓋伯者徵兵有常賦而不以大衆往也列國自修怨霸國獨伐則書帥師用衆也外兵獨稱師卿大夫將也内兵獨稱師君將無功而諱之也莊八年次郎圍郕與齊同役而齊專其利僖十八年救齊與宋爭衡而宋擅其功故君以為慙而史不敢斥也二役皆重事必不使㣲者將如卿將則當書某帥師以是知其為諱也魯君即位薨葬二章子卒附内君之不書即位也舊史無其文而孔子因之以見義也其薨而不地葬而不志則孔子削之以見義也蓋攝而不行即位之禮者不敢居也繼弑君而不行即位之禮者隠之也無故而行即位之禮者常也繼弑君而行即位之禮者無隠先君之心也不行即位之禮則舊史無其文以為孔子削之則義無所處矣謂不請命于天王則十二公之所同也謂不承國于先君則於昭公之書即位不可通矣若君之薨則未有不地者也路寢書小寢書高寢書楚宫書臺下書至薨而不知其地則其為臣子所不忍言也明矣桓公之薨則不得不地者也晉侯卒于扈宋公卒于曲棘皆地公薨于外而可以不地乎然如齊而夫人偕薨于齊而夫人孫則雖地而不嫌於無故矣薨未有不書葬者夫人書葬君之母而用夫人之禮者書葬君之母而不用夫人之禮者亦書葬至君薨而不葬則臣子之罪明矣安知非舊史本無薨地或葬不以禮而不書也隠公之薨也討於蒍氏有死者使舊史據當日之誣辭則必書蒍氏賊公矣子般之卒也必書圉人犖賊子矣閔公之薨也必書卜齮賊公矣倘為國諱惡則竟書公薨于蒍氏子卒于黨氏公薨於武闈矣以是知孔子削之也隠公之薨也既歸獄于蒍氏以欺國人則未有不以禮葬者然猶可曰執國者賊臣也子般之卒也閔為之變焉閔之薨也僖為之變焉而有不以禮葬者乎且季氏絶昭公於先君之兆而書葬則非舊史不書明矣以是知孔子削之也何以知不書葬之為賊不討也以外君見弑賊討而書葬知之也桓公書葬則義之變也敵國相仇臣子雖志於復而不能必其時也而先君之喪又不可以久而不葬也故與蔡靈公别為一例而書葬此義理之權衡也凡即位不日者有定日也定之即位日無定日也因事之變而録其實也子卒而不地葬而不志義與成君同謂卒不宜地葬不宜志者非也縁子之心不忍以成君自居而國人待之猶君也王猛在喪而稱王子般卒而閔不行即位之禮則子不異于成君審矣夫人之薨不地有常所也君薨宜于路寢而有不于路寢者皆書之則子卒宜于喪次而有不于喪次者亦宜書之以志變矣葬者臣子之終事也姒氏之卒也書葬而謂子之葬可不志乎為此說者蓋因傳稱子野以毁卒而不知其為故也春秋之文辨果以毁卒則書子野卒于喪次般赤見弑之迹不益顯乎而其文一施之是使故與毁無以别也季孫之取卞也公歸自楚而不敢入矣瑕釁既開故戕嗣子立稚昧以固其威權不然君方在殯國無變事而子次于季氏何為者乎季氏隂弑而以毁告羣臣不敢詰國人不能知猶鄭髠頑見弑而以瘧訃也故與般赤無異文焉子般之卒也閔為之變而不書即位矣子野以故卒則昭公之書即位何也有隠而不行即位之禮者變也有隠而不能不行即位之禮者尤變也季氏既以毁告則雖欲不行即位之禮而不得矣子卒之地及葬則可削而公之即位獨不可削何也經有特文以見義而未嘗没事之實也薨卒未有無其地者君薨子卒未有不葬者故可削以見義也若即位而削之則與未行即位之禮無别矣昭雖立于季氏而不與罪人同心其迹可考而知也桓之立也翬為逆女焉宣之立也遂為逆女焉昭二年如晉至河乃復而季孫宿如晉蓋恐公訴於晉使不得遂而私自託也以是知政在季氏惡由季氏公羸而不能自主也傳曰公如晉而不得入季孫如晉而得入惡季孫也得其義矣未葬稱名父前子名也既葬不名無所屈也子般子野日卒黨氏徵之季氏告之也赤卒不日變由夫人慶父秘而不可詳也諸侯見弑見殺四章弑君目其人者大臣貴戚赴告有主名也稱人者倉卒生亂賊由㣲者本未得其主名也稱盜者隂賊而不知為何國之人也故盜不稱弑非其君也不目其人不稱國人而以國舉者懸獄而不敢有所歸也弑君而稱人者三宋杵臼死于孟諸不知操刃者誰也齊商人死於申池亦不辨其為歜與職也第知倉卒生亂而賊由㣲者舍宋人齊人無可書也莒密州之事必此類也若是者乃舊史之文也弑君而稱國者四晉州蒲呉僚之弑赴告不以程滑鱄設諸必曰衆亂而無主名也舊史承赴而書非目其人必曰晉人呉人也而實欒書公子光也欲仍其舊則非實欲正其失則無徵故第書其國有是事而不敢溢一辭焉若書晉人呉人是决其為衆亂賊由㣲者而書光得自脱于是獄之外矣薛比莒庶其之事必此類也若是者非舊史所能及也君弑賊不討不書葬而蔡景公許悼公書葬何也世子弑君討賊者在國人與鄰國耳而國人奉以為君隣國與之為禮故反不削其葬以志人道之滅息也晉里克衛甯喜見殺矣而二君之葬不書何也不訃也謂克與喜之討不以罪者近似而非其實也夷吾立衎復國以卓與剽為簒而殺之為討罪則安肯為訃于隣國哉無訃而魯不㑹雖克與喜以罪誅二君之葬亦無由著于册書也然則弑而不書葬者安知不皆以無訃乎君弑而當國者其讐仇謂無訃可也晉趙盾宋鮑齊元弑君者别有主名安肯自比于逆亂而不以禮葬先君哉以是知見弑之君之葬其國有訃有不訃舊史有書有不書而一切削之者春秋之法也宋萬魯慶父傳以為既討而二閔之葬不書何也魯為慶父立後則與瀦宫殄滅之義大悖矣故不書葬以罪臣子宋則與魯深怨故不告葬而魯亦不㑹與國君死于非命而書葬者三魯軌蔡般戕之者隣國也蔡侯申殺之者盜也殺于盜則不知賊之在也雖欲討而無所施也戕于隣國臣子有復讐之義而與討賊異故異文焉而戕于隣國又與盜殺異盜則不知其孰誰也戕于隣國葬雖無譏而志在復讐則其事可按也蔡為楚弱久矣國復于既滅之後而召陵之侵栢舉之戰猶能以楚為事魯莊則在喪而主齊婚矣此見諸行事之不可掩者也蔡侯申之死傳謂賊由公孫翩非也果翩也則或目其人或稱國人可矣無為以盜書也惟不知賊之在故辰以懼罪而奔姓霍以見疑而殺也魯史有以傳聞書者楚頵蔡固許悼公見弑之類也世子弑君未有赴告于隣國者即訃必以告終之常辭而書弑者以傳聞得其實也經有以義革舊史之文者晉卓齊荼書君書弑之類是也里克陳乞以討簒為名舊史承而書之必曰殺公子卓殺公子荼而正其君臣之名絶亂本也何以明其然也左氏於奚齊卓並稱殺公榖並稱弑舊史所見亦若是而已矣傳曰弑君之賊不氏翬隠之罪人故終隠之篇不稱公子非也未有貶于未弑之前而不貶于既弑之後者且自翬以至宋萬去氏以示貶而自慶父至經之終弑君者皆氏則皆無貶乎況小國之大夫如邾庶其邾快逺國之大夫如秦術呉札有至春秋之終而不以氏見者矣以弑君之賊而去氏以為貶則罰不稱罪貶弑君之賊而與無罪者同稱則名不當物以是知其不可通也蓋宋萬以前外大夫皆不氏故弑君之賊亦不氏慶父以後内外之大夫皆氏故弑君之賊亦氏皆舊史之文隨世以變而孔子因之者也宋萬以前祭仲孔父仇牧皆氏而謂外大夫不氏何也祭仲命卿故比于王朝之卿孔父仇牧魯人重其節皆舊史之特文也其餘如紀履繻鄭詹鄭宛皆名而不氏則州吁無知宋萬無轉書其氏之道也慶父以後莒挐莒慶皆不氏而謂外大夫皆氏何也小國之大夫也如邾庶其邾快雖至經之終而不以氏見也其義即于翬見之以一人之身而當隠之世則獨以名見矣當桓之世則稱公子矣其勢未張雖無罪稱名其勢既張雖有罪稱公子以此知為舊史之文而非褒貶所寓也孔子仍而不革何也其書氏者可削也其未書氏者則不能増也苟以是為褒貶設其人可褒而氏為舊史所不載孔子惡從而得之討賊討賊稱人者四州吁無知不可稱國殺也又不可稱石碏雍廩殺也稱國以殺則齊衛無君目石碏雍廪則疑于二人之私矣陳佗夏徵舒不可稱蔡殺楚殺也又不可稱蔡侯楚子殺也稱蔡殺楚殺則與國殺大夫同文目蔡侯楚子則疑于二君之私矣若是則皆辭有所窮宜與弑君殺大夫公子稱人同義而先儒以為人人得而誅之何也亂賊而非以其罪討者皆不稱人殺夏徵舒稱楚人而入陳稱楚子尤其義顯著者也執諸侯稱爵為伯討而討賊不可以稱爵何也必執而歸于京師使即刑於司宼然後於義為盡稱爵則疑于兼罪其專殺故一斷以討賊之義而稱人記曰臣弑君凡在官者殺無赦則不待九伐子弑父凡在宫者殺無赦則不必士師此三代之達禮而春秋通其義於國人隣國皆所以廣忠孝之路嚴縱逸之防使亂臣賊子無所逃于天地之間也其見殺而或稱君或稱爵或稱大夫公子何也惡已前見矣春秋雖重亂賊之誅亦不使誣衆行私者得假公義以掩其惡故稱君者所以罪國人始不能討而奉以為君也稱爵者所以見其為隣敵之相誘相戕而非能討賊也稱大夫者見其為君臣之相猜相圖而非能討賊也稱公子者見其為公子之相傾相軋而非能討賊也蓋輕重之權衡曲直之繩墨必如是而後無匿焉欒盈良霄何以一同於討賊之辭也使盈與霄而得所欲當置其君于何地乎趙鞅荀盈士射吉治兵相攻而以叛書欒范構怨駟良爭衡而盈與霄之死以討賊書皆為其有無君之心而後動于惡也據邑以叛罪在不赦況伐國而乗公門者乎其不得與討賊異辭決矣呉楚徐越二章先儒于呉楚徐越稱人稱爵曰進之而楚穆莊以後稱人曰貶之皆非也楚始以號舉而自僖文以後君臣見于册書者一同於齊晉蓋楚強戰勝天下而與晉狎主諸侯之盟也自僖以前侵伐皆書荆而來聘獨稱人則魯人之私也自成以前列國之侵伐少則稱人衆則稱師君將則稱君而楚亦然列國之㑹盟君出稱君卿大夫出稱人而楚亦然自成二年戰于鞌列國之卿以名見而六年楚公子嬰齊伐鄭亦以名見矣成二年嬰齊㑹蜀以名見而十五年㑹呉于鍾離列國之卿皆以名見矣自成以後列國之卿帥師盡稱名其將卑則不以名見而或稱人或稱師而楚亦然不獨書辭同其先後詳略之世年亦相次也所以然者諸侯之視楚不異于齊晉故魯史之記楚事一同于齊晉也徐勢未張呉越後起故常以號舉而其事或為魯人之所喜則間稱人焉間稱爵焉齊桓之興徐助齊以撓楚而魯睦于齊故取舒伐英氏獨稱人襄五年㑹戚吳入聴諸侯之㑹故稱人栢舉之戰抑楚救蔡故書爵皆魯人私喜之也猶狄與邢同伐與齊邢同盟則書人而餘從其常號也惟栢舉稱爵入郢舉號一事而前後異稱故先儒以為筆削之㫖不知喜其敗楚而稱爵惡其班處楚宫而仍以號舉皆舊史之情也謂孔子以是為褒貶則商臣次厥貉伐麋皆書爵而自僖公以後楚無以號舉者豈前此皆貶而後此則一無貶乎至昭四年㑹于申徐序滕頓胡沈小邾之上而稱子五年伐呉越始見經而與徐並稱人蓋方是時楚獨操霸權魯畏之過于齊晉故視徐越一同于列國而君㑹則稱爵大夫將則稱人也越之見經也或稱越或稱於越稱越者從呉楚之告也稱於越者從越告也一國而兩稱舊史從告春秋不革而謂稱人稱爵稱號紛紛然易史文以為褒貶乎呉之興㑹盟侵伐諸侯皆聴焉其勢不異于楚而終以號舉何也定哀以前呉雖強未能懾威乎上國也定四年入郢而班處其宫哀七年㑹于鄫而徵百牢八年伐魯為城下之盟魯人憾焉又知其亟暴而無能為也故憎而賤之艾陵之戰借其力以抗齊而仍以號舉則憎而賤之可知矣黄池之㑹與晉爭霸則不得不以爵舉也使書公㑹晉侯及呉于黄池則二霸之實不可得而見矣惟始聘而備君臣之辭則諸卿重季氏之文而尊而異之也是亦魯人之私也春秋於呉多殊㑹而楚無之先儒遂謂春秋惡呉過于楚非也因事以立文而各有所當焉耳楚㑹諸侯始于盂宋公召之自曹以外皆楚之屬而偕楚子以來不得曰宋公陳侯蔡侯鄭伯許男曹伯㑹楚子于盂也僖二十七年楚人自帥四國以圍宋魯懼而徃㑹以受盟不得曰公㑹陳侯蔡侯鄭伯許男曹伯㑹楚人盟于宋也成二年嬰齊内侵而魯君徃㑹之諸國之卿大夫亦各徃㑹之而受盟焉不得曰公㑹秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人㑹楚人盟于蜀也至宋虢之㑹晉楚各帥其屬以至申之㑹楚召而諸侯聴命焉不得以㑹楚為文又明矣若成十五年㑹呉于鍾離襄十年㑹呉于柤十四年㑹呉于向則呉在是而晉帥諸侯以㑹之㑹呉者晉志也魯從晉而徃㑹者也非㑹又㑹無以徵事實見情勢也襄五年秋諸侯㑹于戚而呉人入聴命則不書㑹呉于戚矣夏叔孫豹衛孫林父並受命于晉以㑹呉而非衛志也則不書豹㑹衛孫林父㑹呉于善道矣故曰比事屬辭春秋教也滅國四章遷國邑降國邑取邑附見于經者齊滅國二晉滅國五楚滅國十有四呉滅國三衛莒蔡鄭滅國各一虞晉滅國一楚秦巴滅國一自周之衰諸侯相兼並者多矣而自莊以前無一見經者楚則與魯未通也列國則不敢告滅也晉武獻兼國甚多而下陽以外皆不書隠二年莒人入向宣四年魯伐莒取向而向亡不見于經則知滅國而不告者多矣然其事多在桓文未霸之前何以知其然也霸者以存亡字小為義故桓文襄悼之盛諸侯鮮私爭焉況滅國乎齊桓滅譚遂在未霸之前二幽以後則惟以救患分災為務矣晉主霸近百年未嘗滅先王之建國潞氏甲氏留吁陸渾而外惟㑹呉于柤合諸侯以滅偪陽必假公義以討告也衛之滅邢則齊桓既殁晉文未興之前也齊之滅萊莒之滅鄫則楚勢甚張悼公圖霸而未成方藉其力以服楚鄭故乘是以自封而不能詰也蔡之滅沈鄭之滅許則霸統既散之後也左氏傳曰雖及滅國滅不告敗勝不告克不書于䇿呉楚之告滅以威中夏也萊之滅齊告之也潞氏甲氏留吁陸渾之滅晉告之也衛之滅邢則邢告也莒之滅鄫則鄫告也蓋邢周公之裔而鄫魯之屬也衛莒滅之不宜以告于魯沈許則䧟于楚而與夏不通久矣其滅必蔡鄭告之也偪陽之滅則魯人同役歸而志之也惟下陽虞晉同役而譚遂之滅齊方仇魯告者何國不可得而推矣下陽之滅公羊氏以為虢君在焉據左氏則虞虢並滅于五年之冬蓋滅下陽執虞公以吿而書虞虢之滅則不告而不書舊史所無雖知其事不能益也武獻以下兼國若霍楊韓魏沈姒蓐黄無一見于䇿書者況虞虢天子之三公同姓之貴國乎其無辭以告于魯明矣然則執虞公何以告其以執告正欲掩其滅之迹耳觀傳所稱修虞祀歸職貢則必以小邑存其五廟可知矣何以知非虞自告也使虞自告則必具詳晉人之襲盜二國之喪亡而備書于舊史矣春秋之初書降國者二使服而為己屬也書遷國者三傳曰遷者猶未失其國家以往者也故紀郱鄑郚雖遷而季猶得以酅後五廟焉其降之遷之何也重滅國也自莊以後無以降與遷書者矣隠公之初書外取邑二而後此無聞焉蓋列國交爭疆埸之邑攻奪無常以為不足赴告焉耳此世變之尤著者也凡書滅者國亡君死而他無可書也亡國之君奔不書出者無所出也國滅而君奔或執以歸則是君之終也例當書名而間失其名者赴告畧也凡滅國或書人或書師或目其君未有名其君者而衛侯燬名魯人惡之也同姓相滅終春秋僅見于此而邢又周公之裔是以魯人惡之也誘殺蔡侯般楚子䖍名亦此類也諸侯奔執歸入二章兄弟爭國奔而以名係國者示當承國也鄭忽曹覊莒展輿是也名不係國者簒也突與赤是也諸侯出奔而名者國有二君也鄭伯突名以忽也衛侯朔名以黔年也北燕伯欵于傳無徵而事宜類此矣無二君則不名衛成公獻公郕伯是也無二君而名者去國而不返也諸侯卒必名去國而不返則以是終矣紀侯大蔡侯朱莒子庚輿邾子益是也奔而返國執而返國無不名者已嘗失位矣至是而復宜目其人也曹負芻獨不名歸自京師則其位未嘗絶也爭國而奔入稱名者逆也鄭突衛朔是也爭國而奔入不稱名者正也衛獻公北燕伯是也返國而難則書入莒去疾是也展輿據國而強入焉難可知矣而鄭伯突衛侯朔則為逆辭不獨其事本逆也魯宋衛陳蔡同心而助突齊魯宋陳蔡以納朔而抗王師則其入也何難乎返國而易則書歸鄭世子忽衛侯鄭衛侯衎是也突既奔則忽之歸易矣叔武為守王與晉釋之則鄭之歸易矣剽既弑則衎之歸易矣歸而不書所自者赴告畧也書所自者赴告詳也𫝊以為有奉非也衛侯鄭之歸也在城濮之後而書自楚則非楚有奉可知矣歸而書復者有不復之勢也第書歸者無不復之勢也惟蔡侯廬陳侯呉書歸則不與楚之封國也且其國既亡矣若書復歸則與未亡者無别焉耳莒去疾之係國則文當然也突與赤之入其文皆有所承雖不係國而知為鄭曹之公子也去疾之入也文無所承不係莒則知其為何人哉然則何以知展輿之為正也使展輿非正則文有所承當從突與赤之例而不以名係國矣曹羈之奔也承戎侵曹之文而復稱曹羈鄭忽之奔也承突歸于鄭之文而復稱鄭忽則以别于不當承國者可知矣以是知展輿之為正也諸侯之奔例不名而國有二君則名争國而奔其入也皆名而正者則不名奔而歸執而歸皆名而歸自京師則不名經于爵次名氏一仍舊史而此又以或名或不名見義何也凡爵次名氏一仍舊史或欲革之而無從或雖革之而義無所取也若諸侯之奔者執者其名或見于前或見于後即于舊史所不名而増之所名而削之不為無據也又其事實之所以分大義之所由辨即係于名與不名而安得不託以見義哉何以知舊史之文本不如是也鄭突衛朔稱名以别二君或舊史所能及也争國而奔其入也皆名而衛侯衎不名執而歸皆名而曹負芻不名衛侯衎之入夷儀不名而歸衛名北燕伯欵之奔名而納于陽不名隨事異文而義皆曲當恐非舊史所能及也孔子曰其義則某竊取之矣意在斯乎執諸侯大夫春秋中執諸侯大夫者皆霸國也列國而相執者非霸事未起則霸統既絶之後也凡執皆稱人以是為亂世相陵暴之事而非典法所當行也知然者以晉厲公之執曹負芻獨稱爵也蓋古者方伯連帥轉相監臨故執得其罪而歸于京師則稱爵以是知稱人者相陵暴之辭也外取邑皆稱人而齊侯取鄆以居昭公獨稱爵亦此義也晉文公之執曹伯襄不書人者書以畀宋人則其失已著矣雖蒙上晉侯入曹之文而不疑于霸討也執宋公不稱楚人者主㑹而見執故以諸侯執盟主為文以見情實也諸侯之見執或書歸或不書歸者有告有不告也衛侯鄭曹伯襄曹負芻晉人自以私怨公討而執之故其歸以告于魯也邾宣公莒黎比公之執也以魯人之訴則其歸豈肯以告于魯哉鄭成公之執也雖以貳于楚而魯與晉同伐鄭故其歸亦不以告也外大夫之執不書歸者不告也内大夫執則書至詳内事也晉人執衛侯歸之于京師王在踐土也王在踐土則京師以地言也其事已達于王矣特歸其人于其地耳晉侯執曹伯歸于京師王在京師也歸于京師猶歸于王所也執而書以歸者久而不釋也不書以歸者旋釋之也諸侯之見執不名而滕子嬰齊戎蠻子赤名者自是而失國也諸侯卒必名自是而失國則其事終矣若以褒貶為義則嬰齊之罪豈更加于曹負芻也納君大夫世子介大國之力以求復曰納先儒以為内不受非也北燕伯頓子國其所固有也而書納則以書納蔽罪蒯瞆誤矣以晉之強而㨗菑書不克納則知其非正也公孫寧儀行父從君于昏君弑而違其難又假楚以求入焉惡可知矣蓋是非各存乎其事而不係于書納也春秋通論卷二
