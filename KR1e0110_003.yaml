body:
  text: 春秋通論卷三翰林院侍講銜方苞撰殺大夫公子三章殺大夫稱國者以國法殺之也殺大夫公子稱人者國亂無政而羣下擅相殺也稱盜者隂賊而未得其主名也殺弟與世子目君者過由君也天王之殺大夫無見經者義得專殺也殺其弟書不得專殺也而殺得其罪則不書故子頺子帶子朝之討鄭世子華宋公母弟須之殺皆不見于經也曹宋殺其大夫不名者舊史以傳聞書而未得其名也宋殺其大夫司馬宋司城來奔則未有不得其名者而以官書傳謂魯人貴之理或然也外大夫不以名與行次稱者四而皆與魯接者以傳考之齊高子仲孫則魯人喜之也宋司馬華孫則魯人以為敏也宋司馬司城則魯人貴之也蓋史文之不當者可革也若書氏書官而闕其名則孔子雖知之而不能益也兩下相殺不志于春秋以是為有司之事而非王法所寓也其特書者則辭窮也義有所辨也趙盾之殺先都士縠箕鄭父也稱晉人而殺召伯毛伯不可稱周人也又不可書王殺也殺陳世子偃師獨招之罪也書陳人則失其實矣殺公子比稱楚人則棄疾之姦心隱矣故三者特目其人也宣成而後外大夫無不氏者而宋山獨不氏從告辭也其國惡之故告不以氏謂春秋削之非也弒君之賊無不氏而山以背族削氏則其類頗矣晉陽處父救江稱氏而與公盟魯人惡之則不氏亦此類也大夫公子之見殺善惡有間矣而其辭一施之何也春秋書王法不誅其人身也殺大夫公子之稱國稱人與弒君之稱國稱人異義何也殺大夫必君與秉國者共成之不可以專目君也若弒君既知為當國之大臣則當目其人以著其罪矣如不得其主名又宜從稱人之例矣此以知其異義也弒君者必不得其主名而後稱人大夫公子茍非國殺雖得其主名而亦不得不稱人也晉趙盾之殺三大夫非不得其主名審矣而稱人者不可書盾殺也其赴告必曰國討而不稱國者非其君之意也凡經之辭同而異義者皆于其事别之也先儒以書殺大夫而不去其官為纍上之辭非也鄭良霄晉欒盈不稱大夫奔而位絶也其居位者皆稱大夫不以賢愚異也衛元咺鄭公孫黑與陳泄冶同文則不論殺之當否可知矣惟晉里克衛寧喜稱殺其大夫則變文以著其非討罪也知然者夏徵舒以罪誅則不稱陳大夫也大夫奔經書外大夫出奔自衛元咺始前此近百年豈無大夫去國者而不見于經蓋大夫未張故其國不告或告而魯史不書也自曹公孫㑹而外小國大夫之奔無見經者亦魯史略之也其奔我則書詳內事也自僖以前外大夫之奔不書而內大夫之奔書亦此義也奔未有書所自者而自昭之末以至定哀書所自者三蓋至是而大夫之有邑與民者皆自擅而不屬于公也然曹公孫㑹書自鄸出奔而不書叛則與宋辰華向異矣大夫反國或書所自或不書所自或書歸或書復歸義與諸侯同其書入則事與諸侯同而義各異也入者難辭也諸侯而強入難之者非臣民則當國者也故其事猶有是非焉若大夫而強入則惡不待言矣先儒謂諸侯有復道故書復歸為正歸為貶大夫無復道故書復歸為惡歸為善非也趙鞅之叛也楚公子比之弒也而第書歸則元咺之書復歸亦以其有不歸之勢而非以復為惡可知矣蓋咺之惡固無以加於鞅比也宋魚石晉欒盈書復入而鄭良霄宋公之弟辰仲他石彄公子地第書入則以著其去國有淹速謀入有難易而非以是為褒貶明矣宋華元之自晉歸與鄭良霄之自許入同而再書華元者許鄭壤接奔與入一時之事耳晉宋懸隔奔與歸非一時之事各舉其事不得不再見其名也此當以經為斷而不可以傳亂之者也內大夫之奔惟敖與歸父不書出奉使而道奔也晉先蔑自令狐奔秦不書出亦此義也周公之奔書出而王子瑕王子朝及尹氏召伯毛伯之奔不書出者子朝與敬王分國而居三族奉之敗而奔楚不可以言出也子瑕于傳無考而以敖歸父先蔑推之必在外而奔者也外大夫叛復入外大夫以邑叛者皆書入奔而書入者自外而入內也在國而書入者自國都而入其私邑也其書復入者已絶于國復入而為亂也宋魚石晉欒盈鄭良霄是也魚石之事與華向辰地同而不書叛者挾楚鄭以伐國志間晉以毒諸侯而不止于據邑以叛也良霄書自許而欒盈不書自齊者告辭有詳略也魚石不言自楚何也其出也奔楚楚伐宋而後石入于彭城則自楚不必言矣諸侯兄弟四章諸侯之兄弟見經者十傳曰母弟母兄也奔者譏其薄于恩也盟聘帥師譏其過于寵也夫經書兄弟未言其為母兄母弟也豈奔異母之弟遂無害于恩乎若譏過寵則未見齊年衛黑背之以聘與帥師階亂也以無知與剽之篡弒而預譏年與黑背之過寵則義不可通矣又况無知與剽之世繫本不見於經哉按左氏秦伯之弟針懼選也衛侯之兄縶弱足也公弟叔肸不義宣公而不仕也他如齊年鄭語衛黑背陳黃衛鱄宋辰無一有職司者而經以公子書者多執政然則稱公子者大夫也稱兄弟者不任職也蓋公子之屬疏而無職者其出奔見殺皆不著于册書惟君之兄弟特書之盟聘帥師則見其未有職司而任國之大政耳獨陳招前後稱公子而殺世子偃師稱弟則著其以親屬而忍為大惡也君之兄弟與公子公孫皆以其屬稱耳微傳者無以知公子為大夫而稱兄弟者為無職也經固具此義矣陳招前後皆稱公子使非殺偃師則竟不以弟見矣是弟而為大夫者固稱公子而不稱弟也以是知稱弟而不稱公子者為無職也㑹與盟聘帥師等也虢之㑹陳招稱公子齊年鄭語衛黑背盟聘帥師獨不可以稱公子乎然則弟為無職之稱審矣諸侯之兄弟見經者十而傳獨于陳招稱司徒則公子為大夫之稱審矣盟聘帥師則寵任矣而不得為大夫何也春秋時卿多世職居位任事既久非有大故不得廢而使人代之也而君之兄弟又不肯别居微職也故獨以其屬稱王季子來聘亦此類也諸侯之兄弟不稱名而以行次書者四許叔也紀季也蔡叔蔡季也許叔則國并於鄭而中復也紀季則君將去而使後五廟也以是推之則蔡季即獻舞也蓋封人無子故季以次入而承國焉入書季執書獻舞義各有當而不相悖也蓋蔡季書名則與公子之入而爭國者無以别矣紀季書名則疑于以邑叛矣許叔書名則疑于公子爭國且無以見其中并于鄭而至是始復矣故皆以行次書所以示兄終弟及之義而明其非逆也至公弟叔肸不仕也而比于內大夫之書卒鄭假弟也而不謂弟又義之變也桓十一年柔㑹宋公陳侯蔡叔盟于折杜預曰蔡大夫叔名也古未有以伯仲叔季為名者且于季曰字于叔曰名非所安也以情事推之叔乃蔡侯封人之弟封人老而無子將以承國故使㑹盟其後叔又死乃召季于陳而立之耳非卿大夫也故不稱公子承國非承嗣也故不得稱世子而以行次稱正與蔡季許叔紀季類耳世子列㑹皆以名見而叔不名何也世子以名見固知其為世子也以名而繫于叔則與卿大夫無别矣其不稱蔡侯之弟何也經所書某氏之子某君之弟皆無位之稱也然則叔為蔡侯之弟而將以承國也審矣按左𫝊衛宣公以急子屬右公子夀子屬左公子則為執政重臣而位數有定必君之子為大夫始得稱公子如後世稱太弟親王之類非凡君之弟皆得稱太弟凡親屬皆得稱親王也此非先王之典禮而衰周之政俗也故國史因之而春秋不革以見事實焉遷國遷國見經者七皆瀕于滅亡者也邢衛之遷迫于狄也許之遷迫于楚鄭也蔡之遷迫于吳楚也其宗廟社稷幾不守矣幸而能定故以告而舊史書之若擇地而居則有國者之恆事也傳所載晉遷于新田楚遷于鄀邾遷于繹是也或其國不告或告而舊史不書或書而孔子削之皆未可知也齊桓城三國三章齊桓城三國屬辭各異皆以其實書也城邢者獨三國之師也緣陵則命諸侯城之而齊不與也楚丘則命魯獨城之而諸侯不與也霸者之令有使諸侯承事而已不與者矣襄五年魯衛㑹吳于善道是也然㑹吳雖列序魯衛之大夫而可知為晉令也若城緣陵而列序諸侯則似諸侯自城之而不知其為齊令矣何以知齊人不與也使齊人率諸侯以城則如城邢之列序可也何以知楚丘之役諸侯不與也當是時陳鄭迫于楚宋曹既同城邢之役而齊宋復謀㑹江黃惟魯以內難凡役皆不與故至是使獨任楚丘之役耳衛杞不書遷何也衛之遺民聚于楚丘而作邑焉不可以言遷杞遷則赴告不及或緣陵塞邑而非國都也楚丘衛地而與城內邑同文何也春秋于㑹遇盟戰之地皆不係以國蓋職方具在書某地則知為某國必如彭城之披于楚虎牢之戍于晉而後還係之宋鄭也盟扈㑹扈不序諸侯既曰晉大夫主之緣陵之城不序諸侯又曰齊人不與何也文襄繼霸以後百年中無諸侯自為㑹盟者而文之篇主㑹盟者皆晉大夫也以晉大夫而先諸侯不可序也故不序諸侯而沒晉大夫使齊帥諸侯以城緣陵則無為不序也即諸侯自城之而非齊志亦無為不序也惟令出于齊而齊不與故總書諸侯以見城者諸侯而令者齊人耳至于列序諸侯則似諸侯自㑹自盟而不屬于晉自城而不令于齊又三役之所同也以傳考之諸侯以霸令有事於鄰國而魯人獨書其國事者四城楚丘也戍陳也戍鄭虎牢也歸粟於蔡也其屬詞略同而謂楚丘之城諸侯不與何也經有文同而義異者非以事别即於前後文見之襄五年秋公㑹諸侯于戚冬戍陳楚公子貞伐陳公㑹諸侯救陳則諸侯同戍陳可知矣十年秋公㑹諸侯伐鄭冬戍鄭虎牢楚公子貞救鄭次年公再㑹諸侯伐鄭則諸侯同戍鄭虎牢可知矣若城楚丘歸粟于蔡則前後無所見也果同城則如城成周書㑹齊人某人某人城楚丘可也果並歸粟則如㑹于澶淵宋災故書暨晉人某人某人歸粟于蔡可也且至定公時晉令不行于諸侯久矣不能救蔡而吳專其功蔡既勝楚無為復令諸侯歸粟蓋淮泗通流舟漕易致故蔡人告糴而魯以粟歸耳用此觀之楚丘之惟魯城益信矣內大夫卒二章內大夫之卒必書大夫國體也有生無所見而卒書者矣未有生見于經而卒不書者也而桓莊之間五十年如翬如柔如單伯如溺如結其逆女盟㑹帥師大書特書而卒則無見焉此一經之大義也蓋隱之大夫而臣于桓則背君也桓所建置則黨賊也故凡隱之大夫而臣于桓桓之大夫而死于莊之世者皆不書其卒以示為王法所不容也至莊三十二年而後書牙之卒則莊之大夫也然則叔彭生之卒不見于經何也此義之變也使紀外事當書公子遂弒其君赤及其大夫彭生而為國諱惡不敢然也子之弒不書而第書彭生之卒則習其讀者以為內大夫卒之常辭而殉君之迹隱矣內大夫生無所見而卒猶書况彭生十一年㑹晉郤缺十四年伐邾其事屢見于經使以故出則當如慶父公孫敖之書奔使以事誅則當如公子買公子偃之書刺而當是時兩卿並聘而子卒不地先君既殁而夫人大歸新君即位而強鄰取賂則國之內亂可知矣而彭生自是不見于經則不與罪人同心而死于非命亦可知矣然則彭生之不卒即君薨子卒而不地葬而不書之義也內大夫卒無不書而桓之大夫不書宣之大夫得罪于先君者卒皆書而殉君者不書皆所以發疑端見情實也安知非舊史本不書乎為舊史者非明于春秋之義也再世而不録大夫之卒史無是法也彭生之事非諱而書卒即誣而書刺耳以是知孔子削之也內君見弒者四桓之大夫不卒而其餘皆卒何也繼般繼閔者非篡也諸大夫非與慶父同心者也惟宣之大夫與桓之大夫同罪然特文以見義而餘從其常者春秋之法也桓之篇月不繫王而宣之篇月仍繫王矣不見義于始不知背主事讐皆有可誅之罪也不實録于後不知亂賊皆保首領以殁世也且彭生殉君不得從大夫卒之恆辭而卒不見經使宣之大夫皆不卒則彭生之義隱矣獨削仲遂之卒則與彭生之不卒相混而行父得臣之黨惡皆得自脫于是獄之外矣然則仲遂之卒雖無變禮而亦宜見于經者也內夫人九章內夫人之薨必書不書者閔定哀也書娶者五桓莊文宣成也餘不書得禮而以為常事也或以為娶於公子時事或有之而非春秋之法也以言隱僖可矣定哀則不可考襄之立也少經書夫人歸氏之薨而不書其娶以是知得禮則不書也然則書者皆失禮乎失禮而書者譏也非失禮而書者明嫌也桓夫人之書也以齊侯親送至魯境也莊夫人之書也以娶讐女而親迎也文宣二夫人之書也以喪婚也成夫人無是也而亦書以是知其為嫌也莊之有成風也文之有敬嬴也成之有定姒也其卒也書夫人書薨葬稱小君使哀姜出姜齊姜之娶不書則未知孰為嫡也襄之篇三夫人之薨並書使不備其始末則未知孰為君母孰為君生母孰為君祖母也宣成二夫人之書也非譏遂與僑如之以至乎諸侯之禮異于公子士庶人卿逆而迎于境禮也越國而親迎非禮也何以知其非禮也莊之篇前書公如齊納幣後書夫人姜氏入使親迎為禮則公如齊逆女當以常事而不書矣卿逆為禮則其書何也不書翬之逆而書夫人姜氏至自齊則與文夫人歸寧而至同文不知其為始婚也不書遂與僑如之逆而書以夫人姜氏至自齊更不知其事之端與義之所在矣閔定哀不書夫人之薨何也閔未娶也哀未薨也定則或未薨或卒于公子時也內夫人至各異文因事而屬辭也文姜之至也公親受之于歡矣故不書翬以也哀姜亦公受于齊而不書至者仇人之女不可以入宗廟故變文書入以著其逆也出姜不書逆者不書至而併言之何也貴聘而賤逆君而卑之特略其辭以見公之薄于伉儷著夫人不允于魯之由也蓋宣公之立也長至是而敬嬴仲遂之邪謀兆矣穆姜齊姜則恆辭也君不得越國而迎則逆者以至無譏也文姜之至也桓親受之於歡矣而書至自齊明公之未嘗成婚于歡也如書至自歡則成婚于歡之辭也內夫人出入必書舊史之文也違禮而出則書得禮則不書春秋之法也夫人之禮父母在嵗一歸寧悉書之則不可勝書而違禮而行者其失亦不可得而見矣然亦有得禮而書者則著變也文九年夫人姜氏如齊是也夫人之歸魯也貴聘而賤逆至而不致敬嬴仲遂同心以搆禍夫人至是蓋不安于魯矣故志其出而並志其返也是他日君薨子弒夫人大歸之端兆也惟得禮而歸寧者皆不書然後知出而書者皆失禮也然後知得禮而特書者為著變也文姜之如齊也或在齊襄之世或在齊桓之世而屬辭同文姜㑹齊襄于禚姦也聲姜㑹齊桓于卞為公請也而屬辭同文姜如齊非禮也出姜如齊歸寧也而屬辭同何以别乎此據事直書而義自别者也不待異文以别之也文姜鳥獸行君死于齊姜孫于齊既返于魯而奔齊襄者汲汲焉則書㑹書享書如不問而知其為姦也若齊桓則義著于天下久矣自襄之死姜與齊絶已七年至是齊魯之邦交始通而姜靦顔以歸母家桓之失在不能固拒耳他無嫌也若聲姜則桓之子或兄弟之子也其失在道㑹耳他無嫌也惟出姜如齊無以明其為得禮故特書至以别焉以違禮而行者皆不書至故知書至為得禮也惟得禮而書至故知不書至者皆孔子削之也何以知舊史之備書也為舊史者非明于春秋之法也使夫人歸寧例不書則出姜亦不書而孔子無從而得之矣以出姜之歸寧書知凡夫人之歸寧備書也以出姜書至知凡夫人之備書至也春秋獨于出姜不削以著變而其義皆見矣襄夫人之娶不見于經而左氏以齊歸為娣非也未有志娣之薨葬而反削夫人之薨葬者也歷襄昭定哀而未嘗别見襄夫人之薨以此知齊歸之為嫡也襄之篇並書三夫人之薨葬何以知穆姜之非襄夫人也夫人之薨未有不見于經者隱僖二夫人未書娶也而薨葬見于經桓莊二夫人之大惡也而薨葬不削宣夫人姜氏娶見于經矣而再世未志其薨以是知為穆姜也此不待傳而知者又况傳載穆姜之事獨詳乎哀姜之行得罪于先君齊人討之而魯以其喪歸葬以夫人雖失禮而又以見僖公之厚也出姜以子弒見逐而不得歸祔于先君則宣公敬嬴之惡極矣成風敬嬴定姒之卒書薨葬稱小君非禮也而是時魯尚有君也故諸大夫從君所欲姒氏卒不書薨葬不稱小君禮也而非能行禮也季氏弱其君不使備禮君羸而不敢專也昭公君魯三十年而孟子卒不書薨葬不志蓋季氏逐其君而並黜其夫人也哀不能定其身况能正季氏哉傳稱昭夫人之喪孔子適季氏季氏不絻則惡由季氏明矣內夫人出奔者二大歸者一奔書孫罪在夫人也大歸書歸罪在臣子也出姜之歸也不反矣哀姜之孫也以喪至矣文姜則孫而返返而復出㑹享而其返不見于經何也舊史所無也莊公雖有念母之私而魯之臣子未嘗不心知其醜也其不告于宗廟不著于册書必矣既孫于齊而不書其返又無異文以見之則後出㑹享者知其為何人哉魯夫人皆見于經矣隱夫人子氏既薨莊夫人姜氏未入則出㑹享者非孫齊之夫人而誰哉此不待異文而見者也娶夫人書納幣者二莊二十二年公如齊也文二年公子遂如齊也納幣淺事也公親之非禮也使卿亦非禮也文之納幣書譏喪婚也何以知使卿之非禮乎以宋公使公孫夀來納幣知之也卿納幣為禮則夀之來不宜見于經隱夫人不書葬傳曰夫人之義從君非也古者葬各有期未有君在而久不葬者未有君夫人葬而不書者蓋隱志乎讓不以夫人之禮葬故不書于册也不以夫人之禮葬則書夫人書薨何也隱雖不以夫人之禮葬而史必書夫人猶隱不舉即位之禮而史必書公也惟書公然後知不書即位為志乎讓也惟書夫人薨然後知不書葬為不用夫人之禮也經書紀伯姬之葬傳載晉荀躒如周葬穆后則謂君在而不葬與雖葬而不書皆未得其實也夫人至稱婦者有姑之辭也而稱婦姜者二稱婦姜氏者一或曰齊姜之書氏也承嫡姑之辭也然婦書氏亦無以見姑之為嫡或曰出姜穆姜之去氏也以喪婚而夫人與有貶也亦無以見其必然豈文有衍闕與內女四章內女之歸也非失禮不書得禮而書者著變也無變而書者明嫌也鄫季姬之歸也以及鄫子遇防而書也宋伯姬之歸也以公孫夀納幣行父致女三國來媵而書也紀伯姬叔姬之歸也未嘗有失禮而書則閔其後之變也紀亡而伯姬葬于齊侯變也紀侯殁而叔姬歸于􅈶葬于叔變也故將有其末而録其本焉齊子叔姬郯伯姬把叔姬之大歸亦變也而未嘗預書其歸閔紀二姬之變則録其後之變可矣何用預書其歸也二姬並歸于紀侯者也書二姬之卒葬而不書其歸則似伯姬為紀夫人而叔姬别歸于酅且紀既亡而叔姬之卒葬係以紀亦不知其事之端與義之所在矣把伯姬之歸無變無失禮而書者明嫌也歸見于經然後知㑹于洮為公之瀆于恩也然後知把伯姬來以非歸寧志也若不書其歸則不知其為吾女也與諸姬之女適把者無别也而書㑹書來幾與文姜如莒哀姜孫邾同義而疑于大惡矣內女無書逆者而于紀一見之何也古者庶女常為嫡女之媵而不以年為先後詩曰問我諸姑遂及伯姊是也並書二姬之歸並書二姬之卒葬則未知誰為嫡媵也有履緰之逆而後知叔姬之為媵知叔姬之為媵然後知其歸其卒其葬皆不宜著于册書而特書以著其節也于是乎歸􅈶之義始顯白而無所疑矣內女之卒有變然後書紀二姬之書也以國亡君奔而失其所也宋伯姬之書也以災卒也其無變而書者則僖之篇伯姬也鄫季姬也文之篇子叔姬也皆君重其事而為之變故著于册書而孔子不削以徵過焉然則內女之卒舊史皆不書乎史所書者國政也故惟卿卒書外此則公子公兄弟之親公叔伯父之尊無見于册書者矣而况女子外適者乎而况女子未嫁者乎三姬之卒之特見于舊史也其義于齊王姬公弟叔肸之卒而得之王姬由魯歸齊者二而書卒者獨襄之王姬以莊公昵而為之服也公子不為卿而書卒者僅見于叔肸以宣公有愧焉而加隆也然則三姬書卒以君閔之而過于禮之常制可知矣何以知非舊史備書而孔子削之也盡削公子之卒而獨存叔肸以著其賢猶可言也盡削內女之卒而獨存三姬則義所無處矣內夫人之出入既曰舊史備書而孔子削之公子內女之卒所以異者何也常事也非國政之所及也與婦人出疆異矣且君夫人有行承事者必卿大夫也出入必告宗廟也車徒供億動皆及于國政而史有不志者乎鄫季姬之卒既為君之所閔而不書葬何也凡書葬者皆禮之變也以為著其賢者非也宋共姬之葬也以卿供葬事而書紀叔姬之葬也以媵而書二姬之賢與葬之之非禮蓋兩行而不相悖也鄫季姬之卒也以徵過而書其葬也以得禮而不書亦兩行而不相悖也宋共姬之葬以諡而紀二姬以伯叔何也夫人之諡從君者也葬伯姬時紀侯未殁叔姬則媵也不得以君諡配二姬之歸並書而於伯姬特書逆者以為後事之徵也內女書來者六而義各異莊之篇杞伯姬來以非歸寧書也僖之篇伯姬三至以非歸寧而為朝其子與求婦也蕩伯姬來以姑自逆婦而公下主大夫之婚也宣之篇子叔姬來以三月而歸寧又與高固偕也書外大夫來逆者二而義各異莒慶之逆以公為主也齊高固之逆以公為主並徵叔姬三月而遽歸也書來歸者三而義各異齊人來歸子叔姬齊臣子之罪也郯伯姬把叔姬來歸罪在姬也把伯姬之來也傳以為歸寧然歸把不書子則非時君之女明矣而是時文姜已死則無母矣且子叔姬之來也以歸寧之急且與高固偕也外此别無書子某姬來者以是知合禮而歸寧則不書也于此見春秋之世女教之猶謹焉二百四十二年內女非歸寧而來者惟把伯姬則違禮而行者至少也在禮女子二十而嫁有故二十三年而嫁把伯姬桓女也而莊二十五年始嫁何也重喪也文姜死于莊二十一年或把伯亦更有喪也文十二年子叔姬卒踰二年齊人執子叔姬或曰前叔姬卒次襲其號以亂大從也或曰前叔姬以庚子卒而録者誤衍耳春秋通論卷三
