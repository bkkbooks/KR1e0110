body:
  text: 春秋通論卷四翰林院侍講銜方苞撰魯滅國取田邑齊取魯田邑魯兼國書滅者絶其祀也項是也書取者取為附庸也根牟鄟邿闡是也何以知其為附庸也凡取外邑必先書伐某國敗某師而根牟鄟邿闡無所繫也凡小國為鄰所并而魯復取之則與取邑同文者其國已邑之也須句向是也鄫鄆已邑於莒而取鄫取鄆與取根牟鄟邿同文而不言伐莒何也魯嘗請于晉以屬鄫而莒滅之魯嘗城鄆而其後為莒所得魯人蓋曰吾取鄫鄆而非取之于莒也與向之本并于莒須句之本并于邾者異矣故舊史無伐文也季孫宿救台遂入鄆不言伐莒亦此意也齊取魯田者一取魯邑者三皆不書伐以傳考之濟西歡闡賂也鄆則取以居公經特書齊侯必季氏懼討順以承命而不用師徒也凡伐我而取邑不書舊史諱之也賂則自我與之故不諱也定十年齊人來歸鄆歡龜隂之田而前此不見齊人之取僖三十二年取須句文六年復取須句而前此不見須句之失則伐我而取田邑者不書審矣故濟西歡闡之取不待傳而知其為賂也內圍邑經書內圍邑七皆不書叛成三年圍棘拒命者非棘民則齊有司也定六年圍鄆與齊人爭皆不可以言叛也昭二十六年圍成時公已孫齊舉國拒命不得獨書成叛也定十二年圍成欲書公斂處父叛則為孟氏守而非叛也欲書孟孫以成叛又非其事之實故第書圍以紀其拒命而不目其人焉惟昭十三年圍費則南蒯以費叛定十年再圍郈則侯犯以郈叛而經不書蓋中軍既毁尺地一民皆歸三家使以叛書是為三家討賊也而舍叛又無以屬詞故書圍以著陪臣據邑之實而不書叛以寓三家竊國之誅晉趙鞅荀寅士射吉治兵相攻未嘗叛君也而並書叛邯鄲稷據邑以叛趙氏則不書即此義也陽虎以歡叛不書而竊寶玉大弓則書蓋取之公宫不可以不志也比事以觀而不書內叛之義益顯著矣諸國伐魯魯被侵伐必書四鄙惟哀之篇兩書伐我蓋城下之師不可以書四鄙也定哀以前公室雖卑而三家協心尚可以捍禦外侮故鄰國侵伐及四鄙而止耳至是則陪臣數叛三家異心莫肯為國任患故吳齊之師徑薄國都而莫為之蔽也傳載吳師克東陽而進舍于蠶室景伯曰我未及虧而有城下之盟清之役冉有請背城而戰老幼守宫次于雩門之外則不可以書四鄙明矣歸田齊歸魯田或書歸或書來歸或書歸我或不書歸我何也書來歸者使人將命也鄭伯使宛來歸祊是也先儒以為心服而歸之則于來歸衛俘之義不可通矣歸而不書來者無將命者也歸濟西田公親受之于齊也歸歡及闡或疆吏相授受或魯使微者往受而不書其人也濟西之田獨曰我者不獨我有濟西田而所歸獨我故封也若鄆歡闡則魯邑也龜隂之田獨魯有也而書我則贅矣曹田之在濟西者魯嘗介晉以取之矣豈元年並以賂齊而兹所歸者獨我故封與鄭書使宛而齊不目其人何也宛鄭卿而齊微者也搜狩經書狩二搜五大閲治兵各一桓四年春狩于郎非地也六年秋大閲非時也莊八年春治兵非時非地且不以其事也昭定間之搜或時或不時皆以非地書也蓋搜狩有常地自昭以前非其地者獨郎之狩與治兵耳知然者以大閲得其地則不地也至中軍既毁三桓擅國不獨軍制變而搜田之地亦惟其所便而不主故常矣但書搜者選徒約也曰大者境內畢作也書公者公之私行也不書公者國政也惟及齊人狩于禚則志公忘讐而義不在于狩也治兵亦不地而曰以非地書者前書師次于郎以俟陳人蔡人後書師還則治兵于郎不待言矣城築春秋之法常事不書臺囿之築譏從欲也王姬之館之築志變禮也若完城郭作邑以居民有國者之常事也而備書于册何也魯再城中城一城西郛作邑二十有二皆非制也城中城以內難于城內更作城也城西郛或拓郛之址為城以居民或變郛之制為城以備敵也列國之畿疆有限則城邑亦有常魯次國也而二百四十二年作邑二十有二其侵并于小國則敗王略也即自城其封內亦踰舊制也故皆以非常書凡邑曰城而莊二十八年書築郿者制未備也城必備郛郭樓櫓之制而築則無之也內嵗祲有年二百四十年惟桓宣之世一書有年一書大有年承嵗祲也隱五年螟八年螟桓元年大水故三年有秋喜而志之宣自即位以後螽蝝水旱史不絶書故十六年大有秋喜而志之莊六年螟七年大水二十四年二十五年皆大水而其後不書有年者繼災之後稍熟而不可謂有年久則民氣漸復雖有年不復書矣莊之篇書無麥苗者一大無麥禾者一蓋二者俱無乃非常之災一有焉一無焉則農收之常不載于册書矣僖之篇每時書不雨并志雨之時者君重其事故史詳之也文之篇并數時而一書又不志雨之時者君忽其事故史略之也莊三十一年一時不雨而書者承大無麥禾有蜚之後故一時不雨即以為憂亦猶桓宣承屢祲之後而以有年為喜也昭定之篇水旱螽饑無一書者君臣相圖家孚構禍而無心于民事也內災經書內災者六惟雉門兩觀書新作以是知失禮則書者春秋之法也桓宫僖宫之災因而廢焉或不可知若御廪新宫西宫亳社未有不復作者而不見于經則得禮而不書也審矣內毁作經書新作者二譏不度也南門之作非因崩圯則變古踰制明矣凡災而復作者皆不書而雉門兩觀書承僭而不能革也延廄之新非改作也其書以嵗祲也後世興工築以救荒上傭之也古者力役征于民則厲民甚矣毁泉臺何以書不宜作而作者非常也不必毁而毁者亦非常也魯君臣如列國諸侯來諸侯如外大夫來魯君朝霸國奔喪㑹葬內臣出聘皆書如諱之也王事則闕焉而以王禮事強國不臣也君不朝王而間遣聘以夷周於列國亦逆節也故以為國惡而諱之惟僖公兩書朝王蓋王之出勞於義為非而諸侯之就朝於禮無悖也觀僖公之書朝而成公書如京師之義益著矣諸侯書來朝外臣書來聘則明著其非而不為之諱也使一切削之而概書曰來則與非朝非聘而書來者無辨而書如之為諱國惡其義不可得而見矣外諸侯相如則與非朝非聘而書來同皆無名之辭也齊鄭強國州公天子三公豈肯行朝禮於曹紀哉內外平平或稱國或稱人稱國者邦交也魯及齊平及鄭平是也稱人則義各異鄭人來輸平以來者而言也宋人及楚人平則衆辭也君民上下同欲之也蓋被圍三時不獨宋人苦病而求息肩即楚人亦饑疲而思反役若書宋及楚平則邦交之常辭似君大夫專之而無以見二國之人皆困於攻守之實矣然則平莒及郯稱莒人不肯何也使書莒子無以見公及齊侯以強脅弱而拂衆情也書爵書行次書名五章王朝卿大夫外諸侯附庸之君諸侯之兄弟列國之命卿或稱爵或稱行次或稱名或稱人皆舊史之文也以為褒貶所寓非也使其人當褒而舊史以名書無從而得其爵與行次也其人當貶而舊史以爵與行次書無從而得其名也王朝之史外諸侯皆稱名踐土載書之辭曰晉重魯申是也而春秋魯史也外諸侯則魯君之匹敵也故以爵書王朝之卿士兼三公者亦魯君之匹敵也故以爵書宰周公是也王朝卿士與諸侯之卿不可以無别也故以行次書凡伯榮叔南季之類是也記五十命為大夫又曰五十以伯仲周道也附庸之君諸侯之兄弟將承國者上不得儕于諸侯下不可同于諸侯之卿故從王朝卿士之例而書行次蕭叔紀季之類是也列國之命卿不可無别于不命之卿故亦從王朝卿士之例而書行次夷伯祭仲女叔之類是也王朝之大夫則書名子哭劉夏石尚是也傳以為下士非也齊晉繼霸之初王使之禮于魯者皆公卿王子至石尚歸脤王室之卑甚矣而乃使下士乎况救衛逆后于齊乎文宣以後王朝之卿不以行次書而稱子舊說以為爵非也當是時列國之卿㑹盟侵伐恥稱某人而以名見恐王朝之卿亦不樂斥言其行次故特為是稱以尊異之而非有典法也王臣而稱人者三子突書名則大夫也洮與翟泉之王人則卿大夫未可知也蓋洮之盟諸侯皆稱爵翟泉之盟諸侯之大夫皆稱人而王臣乃以名書以行次書非所安也故稱王人蓋辭有所窮也何以知其為卿大夫也使兼三公則如宰周公之稱爵可也其不如尹單劉之稱子何也當時尚未有是稱也子突稱名而並稱王人者亦辭有所窮也使書子突救衛則不知其為王臣也書王使子突則伐救無此文也去人則疑于王子而名突矣傳以子突為字亦非也古有以子某名者見于傳記陳子亢介子推之類是也有以某父名者經所書齊侯祿父儀行父箕鄭父是也春秋未嘗有書字之法也其不當名而名當名而不名皆舊史之文也當名而不名如齊高子仲孫宋華孫司馬司城皆魯人喜而貴之也不當名而名如宰咺宰渠伯糾衛侯燬楚子䖍皆魯人賤而惡之也成僭逆奬篡弒茍有人心者無不藏惡也是以賤而書其名也邢周公之裔而衛滅之蔡魯之同姓而楚誘殺其君是以惡而書其名也以為孔子之特筆而褒貶寓焉則無一可通者矣宰咺宰糾衛侯燬楚子䖍而外不當名而名者榖伯綏鄧侯吾離來朝是也此舊史之文隨世以變而不可以義理求之者也春秋之初小國之君常稱名而其後乃稱爵猶成宣以前列國之卿大夫常稱人而其後卿以名見也榖鄧國小而逺于魯故視之如邾儀父郳黎來之屬而書名桓十五年邾人牟人葛人來朝三國之君也而稱人則榖鄧之書名不足異也傳以邾儀父為字郳黎來介葛盧為名而有所差别非也經所書齊侯祿父箕鄭父儀行父皆名無以知儀父之獨為字也且以平邱之傳考之邾與郳介班也而強為差别可乎舊史所稱無義理之可求而孔子不革何也榖伯綏鄧侯吾離楚子䖍衛侯燬渠伯糾爵與名並載者革而書爵可也而邾與牟葛之稱人者無從而得其名也宰咺之稱名者無從而得其爵與行次也而安得不一仍其舊哉且仍之而世變邦交即于是可考焉則義存乎其間矣周語規方千里以為甸服其餘以均分公侯伯子男孟子曰天子之卿受地視侯大夫受地視伯元士受地視子男秦周以前之書無言畿內有五等之爵者惟公羊傳曰寰內諸侯蓋據春秋所書周公凡伯尹子之屬而為言也王制曰分天下為左右曰二伯蓋據公羊氏陜以東周公主之陜以西召公主之並周南所稱召伯而為言耳不知詩稱召伯以行次言非爵也召公在文王時豈得為方伯乎春秋所書凡伯祭伯召伯亦以行次書與榮叔南季類也其稱伯多于叔季者承嗣多長嫡也周公祭公天子之三公也蘇子尹子單子劉子則與諸侯列序特為是稱以尊異之非伯子男之子也尹單劉皆執政使有五等之爵豈宜居卑列哉且王臣見經者何以獨有公伯子而無侯男哉又何以自文以前王臣無一子爵自文以後㑹盟征伐無一非子爵者出㑹哉蓋天子之卿本當以行次稱如二雅所稱南仲申伯召伯周語所稱樊仲是也春秋之初列㑹而稱王人者皆王朝卿大夫以不可爵諸侯而斥王臣之名與行次故但稱人至文之世晉卿㑹盟皆以名見而不肯稱人王朝之卿無轉稱王人之理故女栗之盟特稱蘇子以尊異之而自是王臣㑹盟皆稱子矣列于㑹盟稱子而居畿內亦稱子矣赴告於諸侯亦稱子矣子朝之亂單劉稱子而召伯毛伯奔楚從其恆稱皆據王室之告辭也召毛得罪于王則告辭不復尊異之明矣閔之篇書齊高子來盟昭三十二年城成周傳稱魏子南面則子乃時人相尊異之稱而非先王之典法明矣家父子突叔服劉夏石尚皆天子之大夫也知然者諸侯之命卿比于天子之卿而稱行次則天子之大夫比于諸侯之卿而稱名固其所也傳稱內史叔服內史于周官為中大夫則稱名者為王朝之大夫審矣其在于詩家父作誦以刺王未有自舉其字者而以父名者屢見于經則家父之為名也審矣程子曰諸侯之卿皆不書官以不受命於天子故不與為卿惟宋王者後得命官故宋卿獨書官非也宰咺宰糾宰周公而外王朝卿大夫未有以官書者則不受命于天子之說不可通矣司馬華孫司馬司城而外宋卿未有以官書者則宋得命官之說不可通矣蓋惟分職授事然後各舉其官若㑹盟侵伐聘問而各以其官書則義無所取而文亦贅矣以天子之宰而供列國聘弔與諸侯㑹盟乃非常之事故舊史以為異而志之宋司馬華孫司馬司城則魯人重之與齊高子仲孫之不名同未可以為典法也咺與糾之名既曰魯人惡之而以官書又曰舊史以為異何也以為異而書其官惡之而斥其名其義並行而不相悖也春秋所書皆列國之卿也大夫之名無登册書者而盟㑹帥師國殺皆曰大夫何也傳載齊晏嬰曰惟卿為大夫蓋周制列國孤卿班同王朝之大夫士則以大夫書者亦舊史之文也王朝之大夫與列國之卿並書名其義必起於此也書人春秋書人其義不一㑹盟戰伐稱人臣下之辭也來聘歸田取田輸平歸俘獻捷執諸侯大夫稱人舉國之辭也弒君殺大夫公子討賊稱人因事屬辭而各有所當也㑹盟戰伐稱人舊史之文也成公以前外卿大夫皆稱人成公以後列國之卿稱名大夫則稱人而小國之卿大夫前後皆稱人此隨世以變著于册書而不可更易者也其餘稱人者或舊史之文或孔子所定而皆屬辭之不得不然者也春秋以號舉者惟楚之先及徐與吳越耳使來聘歸田取田輸平歸俘獻捷執諸侯大夫而稱國是以號舉也目其君則歸田歸俘而書來者疑于其君自來矣歸田而不書來者取我田者與齊侯取鄆同文而疑于得正矣執諸侯大夫者與晉侯執曹伯同文而疑于霸討矣故不得不稱人也惟荆人來聘鄭人來輸平近于以來者稱而知其為舉國之辭者以楚人使宜申來獻捷知之也弒君而稱人者亦辭當然也赴告有主名者稱名以志惡赴告雖有主名而非其實者稱國以志疑若倉卒生亂國人本未得其主名而第知賊由微者則非人無稱也殺大夫公子而稱人者亦辭當然也非以國法殺之不得稱國目其人則兩下相殺也討賊而稱人者亦辭當然也國人而討賊者稱國以殺則國無君目其人則疑于其人之私鄰國而討賊者稱國以殺則非其國之人目其人則疑于其君之私若是者亦非人無稱也然稱人同而于討賊則别為人盡得誅之義焉知然者以殺之不以其罪則不稱人見殺者或稱君或稱爵或稱大夫公子而不獨以名見也此非春秋特起討賊之文乃事殊而義自别焉者也惟邾牟葛三國之君來朝而稱人則魯人簡之莊公及齊人狩于禚為孔子之特筆然亦非用此為褒貶也隱桓莊三世大夫書繫書族書名春秋之初內卿獨以名見者無駭挾柔溺也外卿獨以名見者紀履緰鄭宛鄭詹也先儒謂命大夫書繫與族未命書名誤矣自僖以後無不書繫與族豈更無不命者乎楚卿書繫與族豈尚請命于王朝乎蓋隱桓莊之篇內卿權盛者書繫外卿貴重及死節者書族舊史重其人而詳之也其獨以名見者輕其人而略之也自僖以後魯及列國之卿無不書繫與族者大夫皆張而不敢略也舊史之文隨世以變者皆如此而以義理求之則無一可通者矣然則孔子不革何也其繫與族之未書者不可增也其己書者若削之以歸于一則世變邦交轉不可得而見矣通例七章比事屬辭春秋教也先儒褒貶之例多不可通以未嘗按全經之辭而比其事耳以外諸侯稱爵為褒則楚商臣蔡般皆稱爵矣以外大夫不書繫與族為貶則鄭公子歸生衛寧喜陳夏徵舒書繫與族矣以稱人為貶則文僖以前㑹盟侵伐列國之卿大夫皆稱人而不以名見宣成以後列國之卿以名見而大夫仍稱人小國之卿大夫終春秋恆稱人而莒慶曹公子首獨以名見以是知凡此類皆舊史之文隨時勢以變更而非有典法者也莫悖于妾媵而稱夫人稱薨莫悖于守適而不稱夫人稱卒孔子一仍舊史乃屑屑焉于外諸侯忽稱爵以褒忽去爵以貶于外卿或稱繫與族以褒或去繫與族以貶于外諸侯或貶稱人而與卿大夫無别于外卿忽貶稱人而與大夫無别不惟義無所處亦且變亂事實而非傳信之書矣故一仍其舊使論世者有考焉春秋因事屬辭各得其實而是非善惡無遁情焉豈特不以日月爵次名氏為褒貶哉亦未嘗有特起褒貶之文也其特文皆所以發疑耳蓋事雖變而義非隱無所用特文也惟事變而義隱然後特文以揭之文異然後疑生疑生然後義見是故君薨子卒而不地葬而不書所以見其非正命也桓之篇月不繫王所以見篡弒之作由王法不行也見弒之君不書葬而賊既討則書葬所以見不書葬者以為無臣子也弒于臣者賊不討不書葬而弒于世子者賊不討書葬所以見國人鄰國不以弒君者為賊而以為君乃人道之極變也弒君之賊見殺不書爵而晉里克衛寧喜稱大夫楚比稱公子齊商人稱君蔡般稱侯所以見討之不以其罪殺之不以其事也弒于國人而賊不討者不書葬戕于鄰國而讐不復者書葬所以見臣子之心同而勢則異也㑹盟書㑹而沒公書及而沒公所以見名分之始亂事柄之始移也㑹盟而諸侯不序大夫不名所以見諸侯之失位大夫之亂常也㑹盟不書所為而稷與澶淵書所為所以見其非欲討亂而不果也㑹盟同地前目後凡宜書諸侯盟而臯鼬之盟覆書公及所以見公之受國於意如而以得與後盟為幸也諸侯赴㑹而道卒宜書未至卒于某地而鄭伯髠頑書未見諸侯所以見其以欲見諸侯生釁也魯被侵伐必書四鄙而哀之篇兩書伐我所以見其為城下之師也諸侯奔不名而鄭伯突衛侯朔名所以見國有二君也爭國而奔其入也無不名而衛侯衎不名所以見其正也奔而歸執而歸者無不名而曹伯負芻不名所以見其位未絶也執諸侯大夫恆稱人而晉厲公執曹負芻獨稱爵所以見稱人者乃亂世相陵暴之事也取國邑恆稱人而齊侯取鄆以居昭公獨稱爵所以見稱人者乃彼此相攘奪之詞也內大夫必書卒而桓之大夫不書卒所以見其皆有可誅之罪也宣之大夫皆書卒而叔彭生不書卒所以見其死于子赤之難也僖二十八年兩書公朝于王所而一書王狩所以見就見諸侯之非禮也內戰不書敗而乾時書敗所以見復讐之不宜避敗也狩非微者之事而魯莊公及齊襄公狩稱齊人所以見其為不共戴天之讐也內夫人之娶也例書至而哀姜書入所以見讐人之女不可以入宗廟也夫人之娶例書至而出姜不書至所以見其不允于魯之由也夫人之娶非失禮不書而成夫人書所以見定姒之非嫡也夫人歸寧例不書而出姜書所以見其不安于魯之釁也夫人之行不書至而出姜書至所以見不書至者皆非禮之行也夫人之始至無不氏而出姜穆姜不氏所以見其以喪婚而與有貶也內女之歸諸侯不書逆而紀伯姬書逆所以見叔姬之為媵也內女之卒非有變不書而僖之篇伯姬鄫季姬文之篇子叔姬書所以見君為之變而過禮也公叔伯兄弟公子之不為大夫者不書卒而叔肸書卒所以見叔肸之義與君之有加恩也內女之歸也無變無失禮則不書而杞伯姬書所以見後之來魯㑹洮者非諸姬之女也歸田不書我而濟西書我所以見濟西之田不獨我有而所歸獨我故封也宫室之災不書復作而雉門兩觀書所以見其非制也僖文之篇歷時不雨同而書之異所以見君心之有勤怠也凡此皆特文以發疑而非用以為褒貶也惟王不稱天者三近於削之以示貶而其實非主于貶王也隱之弒也未嘗明見于經雖薨而不地葬而不書猶未知賊之在也錫桓公命王不稱天而後知獄有所歸矣成風薨葬一同於守適無以知僖公之違禮也歸含賵㑹葬王不稱天而後知大從之終不可亂矣然則此三書者亦所以發疑也外此則據事直書以見其實而已故以褒貶求春秋之文亦說經者之誤也春秋之文殺史見極何以明其然也凡宫觀門社之災未有不復作者而所書獨雉門兩觀內女之歸其國未有不納幣者而所書獨宋公孫夀未有不來逆者而所書獨紀履緰吾國未有不致女者而所書獨季孫行父如宋為舊史者非明于春秋之法也使宫觀門社災而復作例不書則雉門兩觀亦無自而見于經矣納幣來逆致女例不書則公孫夀來紀履緰來季孫行父如宋亦無自而見于經矣以雉門兩觀知西宫新宫御廩亳社之新作舊史備書而孔子削之也以宋公孫夀來紀履緰來季孫行父如宋知凡納幣來逆致女舊史備書而孔子削之也春秋書王法不誅其人身何以知其然也書諸侯之奔而逐之者為兄弟為大臣為國人為鄰國弗辨也書大夫之奔而逐之者為國君為同列弗辨也書國殺大夫而所殺之賢姦弗辨也蓋諸侯奔為天下之變事大夫奔為一國之變事不必問其逐之之人也國殺大夫則不王可知矣不必問其所殺之人也春秋微辭隱義每于參互相抵者見之如隱公之弒不見于經而薨而不地則知非正命矣不書葬則知賊未討矣桓書即位則知無隱先君之心矣月不繫王則知王法之不行矣錫桓公命王不稱天則知其為篡弒之賊矣桓之大夫不書卒則知皆有可誅之罪矣翬至桓之篇而稱公子則知操刃者翬矣薨而不地之為弒也于他君之必地見之賊之不討也于外諸侯見弒賊討則書葬見之桓之無恩于先君也于閔僖二公之不書即位見之其為篡弒之賊王法所不容也于錫僖成二公之命王皆稱天見之桓之大夫之皆可誅也于內大夫之皆卒見之翬之操刃而德于桓也于前之不稱公子見之春秋之書微而顯此之謂也舊史之文有以魯君臣之意向為詳略者魯怨鄭忽而助突故忽亹儀之弒不書抗王師以立朔故黔牟之奔不書蓋軌以篡立故崇姦醜正而不以忽亹儀黔牟為君也將稱元帥小國之卿不名而鞍之戰四卿並列諸國之卿皆名則季孫侈其事也有以國人之好惡為進退者則當名而不名不當名而名者是也孔子不革而正之何也弒與奔之不書者不可益也名與不名則雖欲革之以定于一而其道無由也季子魯卿非若齊高子仲孫宋華孫司馬司城之名無從而得之也四人者之名不可得故季子亦仍其舊以見魯人之情宰渠伯糾衛侯燬楚子䖍可去名而存爵也而宰咺則無從而得其爵氏與行次也咺之爵氏與行次不可得故三人者亦仍其舊以志非常而因以見魯人之藏惡焉若鞍之戰則天下諸侯之失政皆見端于此故即以舊史之異文為春秋之特筆也左氏所傳有與經合而可證二傳之非者楚公子比弒其君䖍之類是也二傳以比為不弒而歸獄焉而以左氏徵之則志乎弒者實比而非棄疾也有顯與經背而不可從者鄭歸生弒其君夷宋華元自晉歸于宋之類是也使弒者實公子宋必不歸獄于歸生使華元至河而復必不書自晉歸于宋經之作豈知後之别有傳哉必待傳而後可求則春秋之義荒矣春秋通論卷四
